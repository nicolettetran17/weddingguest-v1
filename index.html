<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Aria & Marcus · Guest Portal — All-In Weddings</title>
  <meta name="description" content="The official guest portal for Aria & Marcus's wedding at AVA Resort Cancún. Book your room block, browse on-property spa, excursions, and dinners." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       Guest Portal — AVA Resort Cancún edition.
       Re-skinned to AVA's brand language: magenta primary, sunset
       coral secondary, sandy-cream neutrals, near-black ink, and the
       editorial Cormorant + Montserrat typography pairing that signals
       coastal modern luxury. The "Oceanfront Promise" backdrop runs
       through hero, timeline rail, and accents.
       ============================================================ */

    :root {
      /* Neutrals — warm, sandy, editorial near-black */
      --ink:            #1a1a1a;     /* AVA editorial near-black */
      --ink-soft:       #3b3633;
      --ink-muted:      #6a655f;
      --ink-faint:      #9a948b;
      --paper:          #ffffff;
      --paper-warm:     #faf6ee;     /* warm sand cream */
      --paper-cream:    #f3ead9;     /* sandy stone */
      --canvas:         #f5efe2;     /* page background — Caribbean sand */

      /* AVA brand magenta (primary accent) — replaces sage everywhere */
      --brand-pale:     #fce6f0;     /* very soft blush */
      --brand-glow:     #ff7eb6;     /* bright pink for hero shine on dark */
      --brand:          #c8307a;     /* AVA magenta (primary CTA, eyebrows) */
      --brand-deep:     #9c1f5d;     /* deeper magenta — "added/savings" */
      --brand-darker:   #5f1138;     /* deepest plum — strong contrast text */
      --brand-bg:       rgba(200,48,122,0.10);

      /* Sunset coral (secondary accent — used sparingly) */
      --coral:          #e76f51;
      --coral-soft:     #f4b1a4;

      /* Caribbean turquoise (tertiary accent — water cue) */
      --turquoise:      #3fa9b5;

      --rule:           rgba(26,26,26,0.10);
      --rule-soft:      rgba(26,26,26,0.06);
      --shadow:         0 14px 32px -22px rgba(0,0,0,0.30);
      --serif:          "Cormorant Garamond", "Playfair Display", Georgia, serif;
      --sans:           "Montserrat", "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--canvas);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button { font: inherit; cursor: pointer; }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--paper-warm);
      box-shadow: 0 0 0 1px var(--rule-soft);
    }

    /* ============================================================
       Top bar
       ============================================================ */
    .bar {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 22px;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      position: sticky; top: 0; z-index: 30;
    }
    .bar__crest {
      display: grid; place-items: center;
      width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, var(--brand-darker) 0%, var(--brand-deep) 100%);
      color: #fff;
    }
    .bar__brand {
      font-family: var(--serif);
      font-size: 14px; line-height: 1.1; color: var(--ink);
      letter-spacing: 0.2px;
    }
    .bar__divider { color: #b3aea4; font-size: 11px; }
    .bar__product {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--brand-deep); font-weight: 600;
    }
    .bar__user {
      margin-left: auto; display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--ink-soft);
    }
    .bar__avatar {
      width: 28px; height: 28px; border-radius: 9999px;
      background: linear-gradient(135deg, #d94d92, #5f1138);
      color: #fff; display: grid; place-items: center;
      font-size: 11px; font-weight: 600;
    }
    .bar__signout {
      background: none; border: 0; padding: 0;
      font-size: 11px; color: var(--brand-deep);
      letter-spacing: 0.06em;
      cursor: pointer;
    }
    /* Clickable profile chip — opens the profile screen */
    .bar__profile {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent;
      border: 0;
      padding: 0;
      cursor: pointer;
      color: var(--ink-soft);
      font: inherit;
      font-size: 12px;
    }
    .bar__profile:hover .bar__profile-name { color: var(--ink); }
    .bar__profile:hover .bar__avatar { box-shadow: 0 0 0 3px rgba(200,48,122,0.18); }
    .bar__profile-name { transition: color 120ms ease; }
    .bar__avatar { transition: box-shadow 120ms ease; }
    /* "Refer & earn" pill — sits in the bar, switches to a deeper
       plum "voucher earned" state once a friend has booked. */
    .bar__refer {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 11px;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--brand-bg);
      color: var(--brand-deep);
      border: 1px solid rgba(200,48,122,0.32);
      border-radius: 9999px;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease, color 120ms ease, border-color 120ms ease;
      white-space: nowrap;
    }
    .bar__refer:hover {
      background: rgba(200,48,122,0.16);
      transform: translateY(-1px);
    }
    .bar__refer--earned {
      background: var(--brand-darker);
      color: var(--brand-glow);
      border-color: var(--brand-darker);
    }
    .bar__refer--earned:hover { background: var(--brand-deep); color: #fff; }
    @media (max-width: 720px) {
      .bar { gap: 6px; padding: 12px 14px; }
      .bar__divider, .bar__product { display: none; }
      .bar__profile-name { display: none; }
      .bar__refer { font-size: 9.5px; padding: 5px 8px; letter-spacing: 0.08em; }
    }

    /* ============================================================
       Section nav
       ============================================================ */
    .nav {
      display: flex; gap: 6px;
      padding: 12px 22px 0;
      background: var(--paper);
      border-bottom: 1px solid var(--rule-soft);
      overflow-x: auto;
      scrollbar-width: none;
      position: sticky; top: 57px; z-index: 20;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav__tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 14px 12px;
      border: 0;
      background: transparent;
      color: var(--ink-muted);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 200ms ease, border-color 200ms ease;
    }
    .nav__tab:hover { color: var(--ink); }
    .nav__tab[data-active="true"] {
      color: var(--ink);
      border-bottom-color: var(--brand);
    }
    .nav__tab svg { width: 14px; height: 14px; }

    /* ============================================================
       Hero countdown
       ============================================================ */
    .hero {
      position: relative;
      padding: 38px 28px 32px;
      background:
        radial-gradient(900px 420px at 80% 0%, rgba(200,48,122,0.42), transparent 55%),
        radial-gradient(700px 480px at 10% 100%, rgba(231,111,81,0.22), transparent 60%),
        linear-gradient(140deg, #131113 0%, #1f1518 55%, #2b1820 100%);
      color: #fbf3ec;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1.6px),
        radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1.6px);
      background-size: 60px 60px, 90px 90px;
      background-position: 0 0, 30px 45px;
      opacity: 0.4;
      pointer-events: none;
    }
    .hero__bg {
      position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&w=1600&q=80');
      background-size: cover; background-position: center;
      opacity: 0.22;
      filter: saturate(1.15) blur(0.5px);
      mix-blend-mode: lighten;
    }
    .hero__inner {
      position: relative;
      max-width: 760px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .hero__eyebrow {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--brand-pale);
      margin: 0;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .hero__eyebrow::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 9999px;
      background: var(--brand-pale);
      box-shadow: 0 0 0 0 rgba(255,126,182,0.55);
      animation: pulse 2.2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,126,182,0.55); }
      80%  { box-shadow: 0 0 0 12px rgba(255,126,182,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,126,182,0); }
    }
    .hero__title {
      margin: 0;
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.02;
      letter-spacing: -0.4px;
      color: #fff;
    }
    .hero__title em {
      font-style: italic;
      background: linear-gradient(120deg, var(--brand-glow) 0%, #fff0f6 50%, var(--brand-glow) 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 5.5s linear infinite;
    }
    @keyframes shine {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .hero__sub {
      margin: 0; font-size: 15px;
      color: rgba(248,243,233,0.82);
      max-width: 56ch;
    }
    .hero__count {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 540px;
    }
    .hero__cell {
      position: relative;
      padding: 14px 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,126,182,0.18);
      backdrop-filter: blur(8px);
      text-align: center;
      overflow: hidden;
    }
    .hero__cell::after {
      content: "";
      position: absolute; left: 0; right: 0; top: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,126,182,0.5), transparent);
    }
    .hero__num {
      display: block;
      font-family: var(--serif);
      font-size: clamp(28px, 4.6vw, 40px);
      line-height: 1;
      color: #fff;
      letter-spacing: -0.5px;
      font-feature-settings: "tnum" 1;
    }
    .hero__lbl {
      display: block;
      margin-top: 6px;
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,126,182,0.85);
      font-weight: 600;
    }
    .hero__meta {
      margin-top: 14px;
      display: flex; flex-wrap: wrap; gap: 18px;
      font-size: 12px; color: rgba(248,243,233,0.78);
    }
    .hero__meta strong { color: var(--brand-pale); font-weight: 600; }

    /* ============================================================
       Stat strip
       ============================================================ */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 18px 22px 4px;
      background: var(--paper);
    }
    @media (min-width: 720px) {
      .stats { grid-template-columns: repeat(4, 1fr); }
    }
    .stat-pill {
      padding: 12px 14px;
      background: var(--paper-warm);
      border: 1px solid var(--rule-soft);
      border-radius: 12px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .stat-pill__lbl {
      font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-faint); font-weight: 600;
    }
    .stat-pill__val {
      font-family: var(--serif);
      font-size: 17px; line-height: 1.2;
      color: var(--ink);
    }

    /* ============================================================
       Action tiles
       ============================================================ */
    .actions {
      padding: 20px 22px 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 720px) {
      .actions { grid-template-columns: 1fr 1fr; }
    }
    .action {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px; align-items: center;
      padding: 18px 18px 18px 16px;
      background: var(--paper);
      border: 1px solid rgba(28,28,28,0.07);
      border-radius: 14px;
      text-align: left;
      color: var(--ink);
      transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 220ms ease,
                  border-color 220ms ease;
    }
    .action:hover, .action:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(200,48,122,0.55);
      box-shadow: 0 14px 32px -22px rgba(200,48,122,0.55), 0 0 0 1px rgba(200,48,122,0.15);
      outline: none;
    }
    .action__icon {
      width: 44px; height: 44px;
      border-radius: 11px;
      background: linear-gradient(140deg, rgba(200,48,122,0.18) 0%, rgba(200,48,122,0.08) 100%);
      color: var(--brand-deep);
      display: grid; place-items: center;
    }
    .action__icon svg { width: 20px; height: 20px; }
    .action__body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .action__title {
      font-family: var(--serif);
      font-size: 19px; line-height: 1.15; color: var(--ink);
    }
    .action__body p {
      font-size: 12.5px; line-height: 1.45; color: var(--ink-muted);
      margin: 0;
    }
    .action__chev {
      color: #b3aea4;
      transition: transform 220ms ease, color 220ms ease;
    }
    .action:hover .action__chev {
      color: var(--brand);
      transform: translateX(3px);
    }
    .action__badge {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px;
      padding: 2px 8px;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 700;
      border-radius: 9999px;
      background: rgba(200,48,122,0.15);
      color: var(--brand-deep);
      align-self: flex-start;
    }
    /* Strong-accent badge variant — solid magenta chip for "premium" callouts
       (e.g. discount %, "wedding rate"). Class name kept as `--copper` only
       to avoid touching the JS templates that emit it. */
    .action__badge--copper {
      background: var(--brand);
      color: #fbfdf9;
      box-shadow: 0 1px 2px rgba(95,17,56,0.18);
    }

    /* ============================================================
       Generic section
       ============================================================ */
    .section {
      padding: 22px 26px 100px;
      min-height: 100%;
    }
    .section__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .section__back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px 6px 8px;
      border-radius: 9999px;
      background: var(--paper);
      border: 1px solid rgba(28,28,28,0.08);
      font-size: 11.5px; letter-spacing: 0.06em; font-weight: 600;
      color: var(--ink-soft);
    }
    .section__back:hover { background: var(--paper-warm); border-color: rgba(28,28,28,0.18); }
    .section__eyebrow {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--brand-deep); margin: 8px 0 2px;
    }
    .section__title {
      margin: 0;
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05; letter-spacing: -0.4px;
      color: var(--ink);
    }
    .section__title em { font-style: italic; color: var(--brand-deep); }
    .section__sub {
      margin: 6px 0 22px;
      font-size: 14px; line-height: 1.55;
      color: var(--ink-soft);
      max-width: 64ch;
    }

    /* ============================================================
       Schedule timeline (Home + Schedule section)
       ============================================================ */
    .schedule {
      display: grid; grid-template-columns: 1fr; gap: 12px;
      padding: 4px 22px 24px;
    }
    @media (min-width: 720px) {
      .schedule { grid-template-columns: repeat(3, 1fr); }
    }
    .schedule__day {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .schedule__date {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--brand-deep);
      margin: 0 0 4px;
    }
    .schedule__title {
      font-family: var(--serif);
      font-size: 20px; line-height: 1.1;
      color: var(--ink);
      margin: 0 0 12px;
      font-weight: 500;
    }
    .schedule__events { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .schedule__event {
      display: grid; grid-template-columns: 60px 1fr; gap: 12px; align-items: baseline;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--rule);
    }
    .schedule__event:last-child { border-bottom: 0; }
    .schedule__time {
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      color: var(--brand-deep);
    }
    .schedule__what { font-size: 13px; color: var(--ink); }
    .schedule__what em {
      display: block;
      font-size: 11.5px;
      color: var(--ink-muted);
      font-style: normal;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    /* ============================================================
       Wedding-weekend TIMELINE — anchor of the home + schedule pages.
       Vertical magenta rail running through three day banners; each day
       merges fixed wedding events with Allie's recommended upsells in
       chronological order so guests see the whole weekend at once.
       ============================================================ */
    .tl {
      position: relative;
      padding: 8px 22px 32px;
      max-width: 880px;
      margin: 0 auto;
    }
    /* Day banner */
    .tl-day {
      display: flex; align-items: baseline; gap: 14px;
      padding: 28px 0 14px 0;
      position: relative;
    }
    .tl-day:first-child { padding-top: 8px; }
    .tl-day__eyebrow {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--brand-deep);
      margin: 0;
      flex-shrink: 0;
    }
    .tl-day__title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.05;
      color: var(--ink);
      margin: 0;
      letter-spacing: -0.3px;
      font-style: italic;
    }
    .tl-day__rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--rule) 0%, transparent 100%);
      margin-left: 4px;
    }

    /* Each row: time | marker (with rail) | content */
    .tl-row {
      position: relative;
      display: grid;
      grid-template-columns: clamp(54px, 12vw, 78px) 28px 1fr;
      gap: 14px;
      padding: 6px 0;
      align-items: stretch;
    }
    .tl-row__time {
      padding-top: 18px;
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      color: var(--brand-deep);
      text-align: right;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    /* Marker column carries the vertical magenta rail and the dot. */
    .tl-row__rail {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
    }
    /* The vertical line is drawn by an absolute pseudo behind the dot
       so it connects through every row in the column. */
    .tl-row__rail::before {
      content: "";
      position: absolute;
      top: 0; bottom: 0; left: 50%;
      width: 1.5px;
      background: linear-gradient(180deg,
                  rgba(200,48,122,0.0) 0%,
                  rgba(200,48,122,0.45) 12%,
                  rgba(200,48,122,0.45) 88%,
                  rgba(200,48,122,0.0) 100%);
      transform: translateX(-50%);
    }
    /* First/last row in a day clip the rail so it doesn't bleed out. */
    .tl-day + .tl-row .tl-row__rail::before { top: 6px; }
    .tl-row__dot {
      position: relative;
      margin-top: 22px;
      width: 14px; height: 14px;
      border-radius: 9999px;
      background: var(--paper);
      box-shadow: inset 0 0 0 2px var(--brand);
      flex-shrink: 0;
    }
    .tl-row[data-key="ceremony"] .tl-row__dot {
      width: 18px; height: 18px;
      margin-top: 20px;
      background: var(--brand-deep);
      box-shadow: inset 0 0 0 2px var(--brand-deep),
                  0 0 0 4px rgba(200,48,122,0.18);
    }
    .tl-row--pick .tl-row__dot {
      width: 18px; height: 18px;
      margin-top: 20px;
      background: var(--brand-darker);
      box-shadow: inset 0 0 0 2px var(--brand-darker),
                  0 0 0 4px rgba(255,126,182,0.32);
    }
    /* Use a small sparkle inside the pick dot. Drawn via background SVG
       so the dot stays a clean circle visually. */
    .tl-row--pick .tl-row__dot::after {
      content: "✦";
      position: absolute;
      inset: 0;
      display: grid; place-items: center;
      color: var(--brand-pale);
      font-size: 11px;
      line-height: 1;
    }

    /* Fixed wedding event card */
    .tl-event {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 14px 18px 14px 18px;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .tl-event:hover { border-color: rgba(200,48,122,0.30); }
    .tl-event__title {
      font-family: var(--serif);
      font-size: 17px; line-height: 1.2;
      color: var(--ink);
      margin: 0 0 4px;
      font-weight: 500;
    }
    .tl-event__sub {
      font-size: 12.5px;
      color: var(--ink-muted);
      margin: 0;
      line-height: 1.5;
    }
    /* The ceremony tile gets a subtle magenta left bar + slightly heavier card */
    .tl-row[data-key="ceremony"] .tl-event {
      border-color: rgba(200,48,122,0.45);
      background: linear-gradient(135deg, var(--paper) 0%, var(--paper-warm) 100%);
      box-shadow: 0 4px 12px -8px rgba(200,48,122,0.35);
      border-left: 3px solid var(--brand-deep);
      padding-left: 16px;
    }
    .tl-row[data-key="ceremony"] .tl-event__title {
      font-size: 19px;
    }
    .tl-row[data-key="ceremony"] .tl-event__title::before {
      content: "✿";
      color: var(--brand-deep);
      margin-right: 7px;
      font-size: 14px;
      vertical-align: 1px;
    }

    /* Allie pick card — the upsell */
    .tl-pick {
      display: grid;
      grid-template-columns: 1fr;
      background:
        linear-gradient(135deg, var(--paper) 0%, var(--paper-warm) 100%);
      border: 1px solid rgba(200,48,122,0.30);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px -16px rgba(95,17,56,0.30);
      transition: transform 240ms cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 240ms ease, border-color 240ms ease;
    }
    @media (min-width: 640px) {
      .tl-pick { grid-template-columns: 168px 1fr; }
    }
    .tl-pick:hover {
      transform: translateY(-2px);
      border-color: rgba(200,48,122,0.55);
      box-shadow: 0 16px 32px -18px rgba(95,17,56,0.35);
    }
    .tl-pick__photo {
      position: relative;
      min-height: 120px;
      background-size: cover; background-position: center;
    }
    .tl-pick__photo::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg,
                  rgba(26,26,26,0.0) 0%,
                  rgba(26,26,26,0.35) 100%);
    }
    .tl-pick__body {
      padding: 16px 20px 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .tl-pick__head {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    }
    .tl-pick__badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      border-radius: 9999px;
      background: var(--brand-darker);
      color: var(--brand-glow);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
    }
    .tl-pick__badge svg { width: 12px; height: 12px; }
    .tl-pick__save {
      display: inline-flex; align-items: center;
      padding: 3px 9px;
      background: rgba(200,48,122,0.15);
      color: var(--brand-deep);
      border-radius: 9999px;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .tl-pick__title {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.1;
      color: var(--ink);
      margin: 0;
      font-weight: 500;
      letter-spacing: -0.2px;
    }
    .tl-pick__why {
      position: relative;
      margin: 4px 0 2px;
      padding: 8px 10px 8px 14px;
      background: rgba(200,48,122,0.07);
      border-left: 2px solid var(--brand);
      border-radius: 4px;
      font-size: 12.5px; line-height: 1.5;
      color: var(--ink-soft);
      font-style: italic;
    }
    .tl-pick__why strong {
      display: block;
      font-style: normal; font-weight: 700;
      font-size: 9.5px; letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-deep);
      margin-bottom: 2px;
    }
    .tl-pick__desc {
      font-size: 12.5px; line-height: 1.55;
      color: var(--ink-muted);
      margin: 0;
    }
    .tl-pick__bullets {
      list-style: none; padding: 0; margin: 2px 0 0;
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .tl-pick__bullets li {
      font-size: 11.5px; color: var(--ink-muted);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .tl-pick__bullets li::before {
      content: "";
      width: 4px; height: 4px;
      border-radius: 9999px;
      background: var(--brand);
    }
    .tl-pick__foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px dashed rgba(200,48,122,0.25);
    }
    .tl-pick__price {
      display: flex; flex-direction: column; gap: 2px;
      font-size: 10.5px; letter-spacing: 0.06em;
      color: var(--ink-faint);
    }
    .tl-pick__price-row {
      display: flex; align-items: baseline; gap: 8px;
    }
    .tl-pick__price-row s {
      color: var(--ink-faint); font-size: 13px; font-weight: 500;
    }
    .tl-pick__price-row strong {
      font-family: var(--serif);
      font-size: 26px; line-height: 1;
      color: var(--brand-deep);
      letter-spacing: -0.4px;
      font-weight: 500;
    }
    .tl-pick__price-row em {
      font-style: normal; font-size: 11px;
      color: var(--ink-muted);
      font-weight: 400;
    }
    .tl-pick__cta {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px;
      background: var(--brand);
      color: #fff;
      border: 0; border-radius: 9999px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: background-color 180ms ease, transform 180ms ease;
      flex-shrink: 0;
    }
    .tl-pick__cta:hover { background: var(--brand-deep); transform: translateY(-1px); }
    .tl-pick--added {
      border-color: rgba(200,48,122,0.55);
      background: linear-gradient(135deg, var(--paper) 0%, rgba(255,126,182,0.20) 100%);
    }
    .tl-pick--added .tl-pick__cta {
      background: var(--brand-deep);
      pointer-events: none;
    }
    .tl-pick--added .tl-pick__cta::before {
      content: "✓";
      margin-right: 4px;
    }

    @media (max-width: 540px) {
      .tl-row__time { font-size: 12.5px; padding-top: 16px; }
      .tl-pick__title { font-size: 19px; }
      .tl-pick__price-row strong { font-size: 22px; }
    }

    /* ============================================================
       Allie concierge callout (Schedule timeline, top)
       — Dark ink + magenta-glow card pinned above the day banners.
       Reads as Allie's broadcast offer (vs. tl-pick which is a
       per-time-slot upsell). One-click to book/unbook transportation.
       ============================================================ */
    .tl-callout {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 20px 22px;
      margin: 0 0 22px;
      background:
        radial-gradient(420px 200px at 100% 0%, rgba(255,126,182,0.22), transparent 60%),
        linear-gradient(135deg, #1a1a1a 0%, #2b1820 100%);
      color: #fbf3ec;
      border: 1px solid rgba(255,126,182,0.30);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }
    .tl-callout::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--brand-glow) 0%, var(--coral) 100%);
    }
    .tl-callout__avatar {
      width: 44px; height: 44px;
      border-radius: 9999px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      display: grid; place-items: center;
      color: #fff;
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 500;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(255,126,182,0.18);
    }
    .tl-callout__body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .tl-callout__eyebrow {
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-glow);
      font-weight: 700;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .tl-callout__eyebrow svg { width: 12px; height: 12px; }
    .tl-callout__title {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.15;
      margin: 4px 0 0;
      color: #fff;
      font-weight: 500;
      letter-spacing: -0.2px;
    }
    .tl-callout__sub {
      margin: 6px 0 0;
      font-size: 12.5px; line-height: 1.55;
      color: rgba(251,243,236,0.78);
      max-width: 60ch;
    }
    .tl-callout__meta {
      display: inline-flex; align-items: center; gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .tl-callout__chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px;
      background: rgba(255,126,182,0.18);
      color: var(--brand-glow);
      border-radius: 9999px;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .tl-callout__price {
      font-family: var(--serif);
      color: #fff;
      font-size: 20px;
      font-weight: 500;
    }
    .tl-callout__price em {
      font-style: normal;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(251,243,236,0.6);
      margin-left: 6px;
    }
    .tl-callout__cta {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 20px;
      background: var(--brand);
      color: #fff;
      border: 0;
      border-radius: 9999px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      white-space: nowrap;
      transition: background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
      flex-shrink: 0;
      box-shadow: 0 10px 22px -14px rgba(255,126,182,0.55);
    }
    .tl-callout__cta:hover {
      background: var(--brand-deep);
      transform: translateY(-1px);
      box-shadow: 0 14px 28px -14px rgba(255,126,182,0.65);
    }
    .tl-callout--booked { border-color: rgba(255,126,182,0.55); }
    .tl-callout--booked .tl-callout__cta { background: var(--brand-deep); }
    .tl-callout--booked .tl-callout__cta::before {
      content: "✓";
      margin-right: 4px;
      font-size: 13px;
    }
    @media (max-width: 640px) {
      .tl-callout {
        grid-template-columns: 1fr;
        text-align: left;
      }
      .tl-callout__avatar { display: none; }
      .tl-callout__cta { justify-self: stretch; justify-content: center; }
    }

    /* ============================================================
       Cards: Room block / Spa / Excursions
       ============================================================ */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }
    @media (min-width: 720px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1040px) {
      .card-grid--3 { grid-template-columns: repeat(3, 1fr); }
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 16px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 220ms ease, border-color 220ms ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(200,48,122,0.30);
      box-shadow: var(--shadow);
    }
    .card__photo {
      aspect-ratio: 16 / 9;
      background-size: cover; background-position: center;
      position: relative;
    }
    .card__photo::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.45) 100%);
    }
    .card__pricetag {
      position: absolute; right: 12px; top: 12px;
      padding: 7px 11px 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      color: var(--ink);
      box-shadow: 0 8px 16px -10px rgba(26,26,26,0.35);
      display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
      line-height: 1.1;
    }
    .card__pricetag__label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--brand-deep);
    }
    .card__pricetag__row {
      display: inline-flex; align-items: baseline; gap: 5px;
      font-size: 11px;
      font-feature-settings: "tnum" 1;
    }
    .card__pricetag__row s {
      color: var(--ink-faint);
      font-weight: 500;
    }
    .card__pricetag__row strong {
      color: var(--ink);
      font-weight: 700;
      font-size: 14px;
    }
    .card__pricetag__row span {
      font-size: 10px; font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
    }
    /* Legacy single-line pricetag (for the "Most booked" badge) keeps the
       old simple styling so its left-positioned override still reads well. */
    .card__pricetag--solid {
      display: inline-block;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .card__body {
      padding: 18px 20px 20px;
      display: flex; flex-direction: column; gap: 8px; flex: 1;
    }
    .card__eyebrow {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--brand-deep);
    }
    .card__title {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.1;
      color: var(--ink);
      margin: 0;
      font-weight: 500;
    }
    .card__loc {
      font-size: 12px; color: var(--ink-muted);
      letter-spacing: 0.02em;
      margin: -2px 0 4px;
    }
    .card__desc {
      font-size: 13px; line-height: 1.55;
      color: var(--ink-soft);
      margin: 0;
    }
    .card__bullets {
      list-style: none; padding: 0; margin: 4px 0 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .card__bullets li {
      font-size: 12px; color: var(--ink-muted);
      display: flex; align-items: baseline; gap: 8px;
    }
    .card__bullets li::before {
      content: ""; flex: 0 0 4px;
      width: 4px; height: 4px;
      border-radius: 9999px;
      background: var(--brand);
      align-self: center;
    }
    .card__foot {
      margin-top: auto;
      padding: 14px 20px;
      background: var(--paper-warm);
      border-top: 1px solid var(--rule-soft);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .card__price {
      display: flex; flex-direction: column; gap: 4px;
      font-size: 11px; color: var(--ink-faint); letter-spacing: 0.04em;
    }
    .card__price__label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 9.5px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--brand-deep);
    }
    .card__price__label .card__price__off {
      padding: 2px 7px;
      border-radius: 9999px;
      background: var(--brand);
      color: #fff;
      font-size: 9px;
      letter-spacing: 0.12em;
      font-weight: 700;
    }
    .card__price__row {
      display: inline-flex; align-items: baseline; gap: 8px;
      font-feature-settings: "tnum" 1;
    }
    .card__price__row s {
      color: var(--ink-faint);
      font-weight: 500;
      font-size: 13px;
    }
    .card__price__row strong {
      font-family: var(--serif);
      font-size: 24px; font-weight: 500;
      color: var(--brand-deep);
      line-height: 1;
      letter-spacing: -0.3px;
    }
    .card__price__meta {
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      line-height: 1.4;
    }
    .card__price__meta strong {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 11px;
      color: var(--brand-deep);
      letter-spacing: 0.04em;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 16px;
      border: 0; border-radius: 9999px;
      background: var(--ink); color: #fff;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: background-color 200ms ease, transform 200ms ease;
    }
    .btn:hover { background: var(--ink-soft); transform: translateY(-1px); }
    .btn--copper { background: var(--brand); }
    .btn--copper:hover { background: var(--brand-deep); }
    .btn--ghost {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--rule);
    }
    .btn--ghost:hover { background: var(--paper-warm); }
    .btn--block { width: 100%; justify-content: center; }
    .btn--added {
      background: var(--brand-deep);
      pointer-events: none;
    }
    .btn--added::before {
      content: "✓";
      margin-right: 4px;
    }

    /* ============================================================
       Stay (room block) screen
       ============================================================ */
    .stay-form {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 22px 24px;
      margin: 18px 0 6px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 640px) {
      .stay-form { grid-template-columns: repeat(3, 1fr); }
    }
    .field {
      display: flex; flex-direction: column; gap: 6px;
    }
    .field label {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .field input, .field select {
      font: inherit; font-size: 14px;
      padding: 11px 14px;
      border: 1px solid var(--rule);
      border-radius: 10px;
      background: var(--paper-warm);
      color: var(--ink);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .field input:focus-visible, .field select:focus-visible {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(200,48,122,0.18);
      background: var(--paper);
    }
    .stay-banner {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 22px;
      background: linear-gradient(135deg, rgba(200,48,122,0.12) 0%, rgba(200,48,122,0.10) 100%);
      border: 1px solid rgba(200,48,122,0.25);
      border-radius: 14px;
      margin-top: 18px;
    }
    .stay-banner__icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--brand); color: #fff;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .stay-banner__title {
      font-family: var(--serif);
      font-size: 18px; line-height: 1.1;
      color: var(--ink);
      margin: 0;
    }
    .stay-banner__sub {
      font-size: 12px; color: var(--ink-muted);
      margin: 2px 0 0;
    }
    .stay-banner__code {
      margin-left: auto;
      padding: 8px 12px;
      background: var(--paper);
      border: 1px dashed var(--brand);
      border-radius: 8px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 13px; font-weight: 600; color: var(--brand-deep);
      letter-spacing: 0.1em;
    }

    /* ============================================================
       Arrive-early tip — social-proof callout on the Stay page
       — Soft coral wash with a stack of overlapping avatar dots
       (suggesting "other guests are doing this") and a one-click
       CTA that moves the check-in date to Mar 12 (2 days before
       the wedding). When the guest already has an early check-in,
       the tip flips into a calm "you're set" confirmation state.
       ============================================================ */
    .arrive-tip {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      margin-top: 12px;
      background:
        radial-gradient(360px 160px at 0% 0%, rgba(231,111,81,0.18), transparent 60%),
        linear-gradient(135deg, rgba(231,111,81,0.10) 0%, rgba(255,205,178,0.18) 100%);
      border: 1px solid rgba(231,111,81,0.30);
      border-radius: 14px;
    }
    .arrive-tip__avatars {
      display: inline-flex;
      position: relative;
      width: 56px;
      height: 28px;
      flex-shrink: 0;
    }
    .arrive-tip__avatars span {
      position: absolute;
      width: 28px; height: 28px;
      border-radius: 9999px;
      border: 2px solid var(--paper-warm);
      box-shadow: 0 2px 6px -2px rgba(95,17,56,0.20);
    }
    .arrive-tip__avatars span:nth-child(1) {
      left: 0;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-darker) 100%);
    }
    .arrive-tip__avatars span:nth-child(2) {
      left: 14px;
      background: linear-gradient(135deg, var(--coral) 0%, #c8532d 100%);
    }
    .arrive-tip__avatars span:nth-child(3) {
      left: 28px;
      background: linear-gradient(135deg, var(--turquoise) 0%, #2c8590 100%);
    }
    .arrive-tip__body { min-width: 0; }
    .arrive-tip__eyebrow {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: #b85537;
      margin: 0 0 3px;
    }
    .arrive-tip__title {
      font-size: 13.5px; line-height: 1.45;
      color: var(--ink);
      margin: 0;
    }
    .arrive-tip__title strong {
      font-weight: 600;
      color: var(--ink);
    }
    .arrive-tip__title em {
      font-style: normal;
      font-weight: 700;
      color: #b85537;
    }
    .arrive-tip__cta {
      align-self: center;
      white-space: nowrap;
      padding: 10px 16px;
      font-size: 11.5px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--coral);
      color: #fff;
      border: 0;
      border-radius: 9999px;
      cursor: pointer;

    /* ============================================================
       Stay-plan panel — educational "why 4 nights" section on the
       Stay page. Sits between the arrive-tip and the date form to
       inform a longer booking before the guest picks dates.
       Anatomy:
         - Header (eyebrow + title + sub + social-proof stat pill)
         - 4-day arc (Thu / Fri / Sat / Sun · the wedding day is
           visually emphasized as the "key" card)
         - Excursion thumbnails — three marquee EXC items the guest
           would skip on a 2-night stay (clickable → Excursions tab)
         - CTA bar — sets dates to Mar 12 → Mar 16. Flips to a
           calm turquoise "you're set" state when the guest is
           already booked for 4+ nights.
       ============================================================ */
    .stay-plan {
      margin: 12px 0 6px;
      padding: 22px 24px 20px;
      background:
        radial-gradient(440px 240px at 0% 0%, rgba(200,48,122,0.10), transparent 60%),
        linear-gradient(135deg, var(--paper) 0%, var(--paper-warm) 100%);
      border: 1px solid var(--rule);
      border-radius: 16px;
    }
    .stay-plan__head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 18px;
    }
    @media (max-width: 720px) {
      .stay-plan__head { grid-template-columns: 1fr; }
    }
    .stay-plan__eyebrow {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--brand-deep);
      margin: 0 0 6px;
    }
    .stay-plan__title {
      font-family: var(--serif);
      font-size: clamp(22px, 3vw, 28px);
      line-height: 1.1;
      color: var(--ink);
      margin: 0 0 6px;
      font-weight: 500;
      letter-spacing: -0.3px;
    }
    .stay-plan__title em { font-style: italic; color: var(--brand-deep); }
    .stay-plan__sub {
      font-size: 13px; line-height: 1.55;
      color: var(--ink-soft);
      margin: 0;
      max-width: 60ch;
    }
    .stay-plan__stat {
      align-self: center;
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      padding: 10px 14px;
      background: var(--brand-bg);
      border: 1px solid rgba(200,48,122,0.32);
      border-radius: 9999px;
      color: var(--brand-deep);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .stay-plan__stat strong {
      font-family: var(--serif);
      font-size: 18px; font-weight: 500;
      letter-spacing: -0.5px;
    }

    .stay-plan__arc {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    @media (max-width: 720px) {
      .stay-plan__arc {
        grid-template-columns: repeat(4, 72%);
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        margin: 0 -24px 16px;
        padding: 0 24px;
      }

      .stay-plan__day { scroll-snap-align: start; }
    }
    .stay-plan__day {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 14px 13px;
      background: var(--paper);
      border: 1px solid var(--rule-soft);
      border-radius: 12px;
      min-height: 132px;
    }
    .stay-plan__day--key {
      background: linear-gradient(160deg, var(--brand-darker) 0%, var(--brand-deep) 100%);
      border-color: var(--brand-deep);
      color: #fff;
      box-shadow: 0 14px 28px -18px rgba(95,17,56,0.55);
    }
    .stay-plan__day-num {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--ink-muted);
    }
    .stay-plan__day--key .stay-plan__day-num { color: var(--brand-glow); }
    .stay-plan__day-num strong {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--ink);
      font-weight: 500;
      letter-spacing: -0.5px;
    }
    .stay-plan__day--key .stay-plan__day-num strong { color: #fff; }
    .stay-plan__day-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--brand-deep);
      margin: 4px 0 2px;
    }
    .stay-plan__day--key .stay-plan__day-title { color: var(--brand-glow); }
    .stay-plan__day-desc {
      font-size: 12px; line-height: 1.45;
      color: var(--ink-muted);
      margin: 0;
    }
    .stay-plan__day--key .stay-plan__day-desc { color: rgba(251,238,243,0.88); }

    .stay-plan__excs-label {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-muted);
      margin: 16px 0 8px;
    }
    .stay-plan__excs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .stay-plan__exc {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 10px;
      align-items: center;
      padding: 8px 12px 8px 8px;
      background: var(--paper);
      border: 1px solid var(--rule-soft);
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: inherit;
      transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
      min-width: 0;
    }
    .stay-plan__exc:hover {
      border-color: var(--brand);
      transform: translateY(-1px);
      box-shadow: 0 12px 22px -16px rgba(95,17,56,0.40);
    }
    .stay-plan__exc-photo {
      width: 56px; height: 56px;
      border-radius: 9px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }
    .stay-plan__exc-body { min-width: 0; }
    .stay-plan__exc-name {
      font-size: 12.5px; font-weight: 600;
      color: var(--ink);
      line-height: 1.2;
      margin: 0 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stay-plan__exc-meta {
      font-size: 10.5px; color: var(--ink-muted);
      letter-spacing: 0.02em;
    }
    .stay-plan__exc-meta strong { color: var(--brand-deep); font-weight: 700; }

    .stay-plan__cta-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding-top: 14px;
      border-top: 1px dashed var(--rule);
    }
    @media (max-width: 720px) {
      .stay-plan__cta-bar { grid-template-columns: 1fr; }
    }
    .stay-plan__cta-copy {
      font-size: 12.5px; color: var(--ink-soft);
      line-height: 1.45;
      margin: 0;
    }
    .stay-plan__cta-copy strong { color: var(--ink); font-weight: 600; }
    .stay-plan__cta {
      align-self: center;
      padding: 11px 18px;
      font-size: 11.5px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--brand);
      color: #fff;
      border: 0;
      border-radius: 9999px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 6px 14px -10px rgba(200,48,122,0.55);
      transition: background 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    }
    .stay-plan__cta:hover {
      background: var(--brand-deep);
      transform: translateY(-1px);
      box-shadow: 0 12px 22px -12px rgba(200,48,122,0.65);
    }
    @media (max-width: 720px) {
      .stay-plan__cta { justify-self: stretch; text-align: center; }
    }
    /* "✓ you're booked for 4 nights" state — switches the whole
       panel into a turquoise confirmation tone instead of the
       magenta call-to-action tone. */
    .stay-plan--booked {
      border-color: rgba(63,169,181,0.32);
      background:
        radial-gradient(440px 240px at 0% 0%, rgba(63,169,181,0.10), transparent 60%),
        linear-gradient(135deg, var(--paper) 0%, rgba(63,169,181,0.05) 100%);
    }
    .stay-plan--booked .stay-plan__stat {
      background: rgba(63,169,181,0.12);
      border-color: rgba(63,169,181,0.34);
      color: #2c8590;
    }
    .stay-plan--booked .stay-plan__eyebrow { color: #2c8590; }
    .stay-plan--booked .stay-plan__title em { color: #2c8590; }
    .stay-plan--booked .stay-plan__cta {
      background: transparent;
      color: #2c8590;
      border: 1px solid rgba(63,169,181,0.45);
      box-shadow: none;
      pointer-events: none;
    }
    .stay-plan--booked .stay-plan__cta::before {
      content: "✓ ";
      margin-right: 2px;
    }

    /* ============================================================
       Extend-stay promo banner (Schedule page)

    .extend-banner {

        linear-gradient(135deg, rgba(200,48,122,0.14) 0%, rgba(231,111,81,0.10) 100%);

      border-radius: 16px;
      overflow: hidden;
    }
    .extend-banner::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--brand) 0%, var(--coral) 100%);
    }
    .extend-banner__chip {
      display: inline-flex; align-items: center; gap: 6px;
      align-self: flex-start;
      padding: 4px 9px;
      background: var(--brand);

      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .extend-banner__body { min-width: 0; }
    .extend-banner__title {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.15;
      color: var(--ink);
      margin: 0;
      letter-spacing: -0.2px;
    }
    .extend-banner__title em {
      font-style: italic;

    }
    .extend-banner__sub {
      margin: 6px 0 0;
      font-size: 12.5px; line-height: 1.5;
      color: var(--ink-soft);
      max-width: 56ch;
    }
    .extend-banner__cta {
      align-self: center;
      white-space: nowrap;
      padding: 11px 18px;
      font-size: 12.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      background: var(--brand);
      color: #fff;
      border: 0;
      border-radius: 9999px;
      box-shadow: 0 6px 16px -10px rgba(200,48,122,0.55);

    .extend-banner__cta:hover {

    .recovery-banner__chip {
      display: inline-flex; align-items: center; gap: 6px;

    .recovery-banner__bullets li::before {
      content: "";

    .recovery-banner__cta {

    /* ============================================================
       Registry — gift the couple
       — Top progress banner shows how many experiences have been
       claimed and how full the shared honeymoon fund is. Cards
       below reuse .card / .card-grid; gifted experiences get a

    .registry-banner {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      padding: 18px 22px;
      margin: 0 22px 18px;
      background:
        radial-gradient(440px 220px at 100% 0%, rgba(200,48,122,0.20), transparent 60%),
        linear-gradient(135deg, rgba(200,48,122,0.10) 0%, rgba(231,111,81,0.10) 100%);
      border: 1px solid rgba(200,48,122,0.28);
      border-radius: 16px;
      overflow: hidden;
    }
    .registry-banner::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--brand) 0%, var(--coral) 100%);
    }
    .registry-banner__chip {
      display: inline-flex; align-items: center; gap: 6px;
      align-self: flex-start;
      padding: 4px 9px;
      background: var(--brand);
      color: #fff;

      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;

    .registry-banner__title {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.15;
      color: var(--ink);
      margin: 0;
      letter-spacing: -0.2px;
      font-weight: 500;
    }
    .registry-banner__title em {
      font-style: italic;
      color: var(--brand-deep);
    }
    .registry-banner__sub {
      margin: 6px 0 0;
      font-size: 12.5px; line-height: 1.5;
      color: var(--ink-soft);
      max-width: 64ch;
    }
    .registry-banner__progress {
      position: relative;
      height: 8px;
      background: rgba(28,28,28,0.08);
      border-radius: 9999px;
      overflow: hidden;
      margin-top: 4px;

    .fund-bar {
      position: relative;

      border-color: var(--brand);

    @media (max-width: 640px) {

      .amount-input input { width: 100%; min-width: 0; }
      .contribute-row { width: 100%; }
      .contribute-row > label { flex: 1 1 100%; }
    }

    /* ============================================================
       Profile screen — guest account view
       — Hero card with avatar / name / email / RSVP, followed by
       the referral program panel and a compact itinerary recap.
       ============================================================ */
    .profile-hero {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 22px;
      align-items: center;
      padding: 24px 24px;
      margin: 0 22px 20px;
      background: var(--paper);
      border: 1px solid var(--rule-soft);
      border-radius: 18px;
      box-shadow: 0 14px 32px -24px rgba(28,28,28,0.18);
    }
    .profile-hero__avatar {
      width: 88px; height: 88px; border-radius: 9999px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-darker) 100%);
      color: #fff;
      display: grid; place-items: center;
      font-family: var(--serif);
      font-weight: 500;
      font-size: 32px;
      letter-spacing: 0.5px;
      box-shadow: 0 0 0 4px rgba(200,48,122,0.14);
    }
    .profile-hero__body { min-width: 0; }
    .profile-hero__name {
      font-family: var(--serif);
      font-size: 28px; line-height: 1.05;
      color: var(--ink);
      margin: 0 0 4px;
      letter-spacing: -0.3px;
      font-weight: 500;
    }
    .profile-hero__email {
      font-size: 12.5px; color: var(--ink-soft);
      margin: 0 0 12px;
    }
    .profile-hero__pills {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .profile-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      background: var(--paper-warm);
      color: var(--ink-soft);
      border: 1px solid var(--rule-soft);
    }
    .profile-pill--brand {
      background: var(--brand-bg);
      color: var(--brand-deep);
      border-color: rgba(200,48,122,0.32);
    }
    .profile-pill--coral {
      background: rgba(231,111,81,0.12);
      color: #b85537;
      border-color: rgba(231,111,81,0.34);
    }
    .profile-hero__signout {
      align-self: flex-start;
      padding: 9px 14px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid var(--rule);
      border-radius: 9999px;
      cursor: pointer;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .profile-hero__signout:hover { color: var(--brand-deep); border-color: var(--brand-deep); }

    @media (max-width: 640px) {
      .profile-hero {
        grid-template-columns: 64px 1fr;
        gap: 16px;
        padding: 18px;
        margin: 0 16px 16px;
      }
      .profile-hero__avatar { width: 64px; height: 64px; font-size: 24px; }
      .profile-hero__signout { grid-column: 1 / -1; justify-self: start; }
    }

    /* ============================================================
       Referral hero — the star of the profile screen
       — Magenta-glow card with a clear reward, the guest's
       deterministic referral code + link, share affordances,
       a small invite-by-email form, and a list of friends with
       per-friend status (pending vs booked).
       ============================================================ */
    .referral-card {
      position: relative;
      margin: 0 22px 22px;
      padding: 24px 24px 22px;
      background:
        radial-gradient(520px 280px at 0% 0%, rgba(200,48,122,0.22), transparent 60%),
        radial-gradient(420px 240px at 100% 100%, rgba(231,111,81,0.18), transparent 60%),
        linear-gradient(160deg, var(--brand-darker) 0%, #2b1a1f 100%);
      color: #fbeef3;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 48px -28px rgba(95,17,56,0.55);
    }
    .referral-card__eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 11px;
      background: rgba(255,126,182,0.22);
      color: var(--brand-glow);
      border-radius: 9999px;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .referral-card__eyebrow svg { width: 12px; height: 12px; }
    .referral-card__title {
      font-family: var(--serif);
      font-size: clamp(26px, 4vw, 34px);
      line-height: 1.08;
      letter-spacing: -0.4px;
      color: #fff;
      margin: 0 0 6px;
      font-weight: 500;
    }
    .referral-card__title em {
      font-style: italic;
      color: var(--brand-glow);
    }
    .referral-card__sub {
      font-size: 13.5px; line-height: 1.55;
      color: rgba(251,238,243,0.78);
      margin: 0 0 18px;
      max-width: 60ch;
    }
    .referral-card__grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    @media (max-width: 760px) {
      .referral-card__grid { grid-template-columns: 1fr; }
    }

    /* Reward strip — "1 friend books → free voucher" visual */
    .reward-strip {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      padding: 16px 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,126,182,0.22);
      border-radius: 14px;
      backdrop-filter: blur(2px);
    }
    .reward-strip__icon {
      width: 46px; height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--coral) 100%);
      color: #fff;
      display: grid; place-items: center;
      box-shadow: 0 8px 20px -10px rgba(200,48,122,0.65);
    }
    .reward-strip__icon svg { width: 22px; height: 22px; }
    .reward-strip__label {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--brand-glow);
      margin: 0 0 2px;
    }
    .reward-strip__title {
      font-family: var(--serif);
      font-size: 18px; line-height: 1.2;
      color: #fff;
      margin: 0 0 4px;
      font-weight: 500;
    }
    .reward-strip__value {
      font-size: 11.5px;
      color: rgba(251,238,243,0.72);
      font-variant-numeric: tabular-nums;
    }
    .reward-strip__value strong { color: var(--brand-glow); font-weight: 700; }

    .reward-progress {
      margin-top: 12px;
    }
    .reward-progress__meta {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11.5px;
      color: rgba(251,238,243,0.7);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .reward-progress__meta strong { color: #fff; font-weight: 700; }
    .reward-progress__bar {
      position: relative;
      height: 6px;
      background: rgba(255,255,255,0.10);
      border-radius: 9999px;
      overflow: hidden;
    }
    .reward-progress__bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--brand-glow) 0%, var(--coral) 100%);
      border-radius: 9999px;
      transition: width 320ms ease;
    }

    /* Code + link blocks */
    .share-stack {
      display: flex; flex-direction: column; gap: 10px;
    }
    .share-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
    }
    .share-row__label {
      grid-column: 1 / -1;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--brand-glow);
      margin-bottom: -2px;
    }
    .share-row__value {
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .share-row__copy {
      padding: 8px 12px;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      background: var(--brand-glow);
      color: var(--brand-darker);
      border: 0;
      border-radius: 9999px;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
      white-space: nowrap;
    }
    .share-row__copy:hover { background: #ffb1d2; transform: translateY(-1px); }
    .share-row__copy[data-copied="true"] {
      background: var(--coral);
      color: #fff;
    }

    .share-buttons {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 12px;
    }
    .share-buttons a, .share-buttons button {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 14px;
      font-size: 11.5px; font-weight: 600;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.10);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 9999px;
      cursor: pointer;
      text-decoration: none;
      transition: background 120ms ease, transform 120ms ease;
    }
    .share-buttons a:hover, .share-buttons button:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }
    .share-buttons svg { width: 13px; height: 13px; }

    /* Invite form */
    .invite-form {
      margin-top: 18px;
      padding: 16px 18px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
    }
    .invite-form__title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--brand-glow);
      margin: 0 0 10px;
    }
    .invite-form__row {
      display: grid;
      grid-template-columns: 1fr 1.4fr auto;
      gap: 8px;
    }
    @media (max-width: 640px) {
      .invite-form__row { grid-template-columns: 1fr; }
    }
    .invite-form input {
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 9px;
      font: inherit;
      font-size: 13px;
    }
    .invite-form input::placeholder { color: rgba(251,238,243,0.45); }
    .invite-form input:focus {
      outline: 0;
      border-color: var(--brand-glow);
      box-shadow: 0 0 0 3px rgba(255,126,182,0.20);
    }
    .invite-form button[type="submit"] {
      padding: 10px 18px;
      font-size: 11.5px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--brand-glow);
      color: var(--brand-darker);
      border: 0;
      border-radius: 9px;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
    }
    .invite-form button[type="submit"]:hover { background: #ffb1d2; transform: translateY(-1px); }

    /* Friend list */
    .friend-list {
      list-style: none; padding: 0; margin: 18px 0 0;
      display: flex; flex-direction: column;
      border-top: 1px solid rgba(255,255,255,0.10);
    }
    .friend-row {
      display: grid;
      grid-template-columns: 36px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .friend-row:last-child { border-bottom: 0; }
    .friend-row__avatar {
      width: 36px; height: 36px; border-radius: 9999px;
      background: linear-gradient(135deg, rgba(255,126,182,0.30) 0%, rgba(231,111,81,0.30) 100%);
      color: #fff;
      display: grid; place-items: center;
      font-family: var(--serif);
      font-size: 14px;
    }
    .friend-row__body { min-width: 0; }
    .friend-row__name {
      font-size: 13.5px; color: #fff; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .friend-row__email {
      font-size: 11px; color: rgba(251,238,243,0.55);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .friend-pill {
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      white-space: nowrap;
    }
    .friend-pill--invited {
      background: rgba(255,255,255,0.10);
      color: rgba(251,238,243,0.75);
      border: 1px solid rgba(255,255,255,0.16);
    }
    .friend-pill--booked {
      background: var(--brand-glow);
      color: var(--brand-darker);
      border: 1px solid var(--brand-glow);
    }
    .friend-row__action {
      background: transparent;
      border: 0;
      color: var(--brand-glow);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer;
      padding: 4px 8px;
    }
    .friend-row__action:hover { color: #fff; }
    @media (max-width: 640px) {
      .friend-row {
        grid-template-columns: 36px 1fr auto;
      }
      .friend-row__action { grid-column: 2 / -1; justify-self: end; padding: 0; }
    }

    /* Compact itinerary recap card on profile */
    .recap {
      margin: 0 22px 22px;
      padding: 20px 22px;
      background: var(--paper);
      border: 1px solid var(--rule-soft);
      border-radius: 16px;
    }
    .recap__head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 12px;
      gap: 12px;
    }
    .recap__title {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.1;
      color: var(--ink);
      margin: 0;
      font-weight: 500;
    }
    .recap__cta {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--brand-deep);
      background: transparent;
      border: 0;
      cursor: pointer;
    }
    .recap__cta:hover { color: var(--brand-darker); }
    .recap__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .recap__cell {
      padding: 12px 14px;
      background: var(--paper-warm);
      border-radius: 12px;
      border: 1px solid var(--rule-soft);
    }
    .recap__cell-lbl {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-muted);
      margin: 0 0 4px;
    }
    .recap__cell-val {
      font-family: var(--serif);
      font-size: 18px; line-height: 1.1;
      color: var(--ink);
      margin: 0;
    }
    .recap__cell-val em { font-style: italic; color: var(--brand-deep); }
    @media (max-width: 640px) {
      .referral-card { margin: 0 16px 18px; padding: 20px 18px; }
      .profile-hero, .recap { margin: 0 16px 16px; }
    }

    /* Cart drawer — perk lines (negative or zero priced) get a
       distinct treatment so the discount stands out. */
    .cart__line--perk .cart__line-price {
      color: #2d8a47;
      font-weight: 700;
    }

    /* ============================================================
       Itinerary drawer (sticky bottom)
       ============================================================ */
    .cart {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      width: min(960px, calc(100% - 32px));
      background: var(--ink);
      color: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 60px -24px rgba(0,0,0,0.45);
      z-index: 40;
      transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 280ms ease;
    }
    .cart[data-empty="true"] {
      transform: translateX(-50%) translateY(140%);
      opacity: 0;
      pointer-events: none;
    }
    .cart__head {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px;
      cursor: pointer;
    }
    .cart__icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--brand);
      display: grid; place-items: center; color: #fff;
      flex-shrink: 0;
    }
    .cart__title {
      font-family: var(--serif);
      font-size: 18px; line-height: 1.1;
      color: #fff;
      margin: 0;
    }
    .cart__sub {
      font-size: 11.5px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.04em;
      margin: 2px 0 0;
    }
    .cart__total {
      margin-left: auto;
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 0;
    }
    .cart__total-lbl {
      font-size: 9.5px; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
    .cart__total-val {
      font-family: var(--serif);
      font-size: 22px; line-height: 1;
      color: var(--brand-pale);
      font-weight: 500;
    }
    .cart__chev {
      color: rgba(255,255,255,0.55);
      transition: transform 220ms ease;
    }
    .cart[data-open="true"] .cart__chev {
      transform: rotate(180deg);
    }
    .cart__body {
      max-height: 0; overflow: hidden;
      transition: max-height 320ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .cart[data-open="true"] .cart__body {
      max-height: 540px;
    }
    .cart__list {
      list-style: none; padding: 0; margin: 0;
      border-top: 1px solid rgba(255,255,255,0.10);
    }
    .cart__line {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 16px; align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
    }
    .cart__line:last-child { border-bottom: 0; }
    .cart__line strong {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 15px;
      display: block;
      margin-bottom: 2px;
    }
    .cart__line em {
      font-style: normal;
      color: rgba(255,255,255,0.65);
      font-size: 11.5px;
    }
    .cart__line-price {
      font-variant-numeric: tabular-nums;
      color: var(--brand-pale);
      font-weight: 600;
    }
    .cart__remove {
      background: none; border: 0;
      color: rgba(255,255,255,0.55);
      font-size: 18px;
      padding: 0; line-height: 1;
    }
    .cart__remove:hover { color: var(--brand-pale); }
    .cart__foot {
      padding: 14px 20px 16px;
      border-top: 1px solid rgba(255,255,255,0.10);
      display: flex; gap: 10px; align-items: center;
    }
    .cart__msg {
      font-size: 11.5px;
      color: rgba(255,255,255,0.65);
      flex: 1;
    }
    .cart__checkout {
      padding: 11px 18px;
      background: var(--brand);
      color: #fff;
      border: 0; border-radius: 9999px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .cart__checkout:hover { background: var(--brand-deep); }

    /* ============================================================
       Toast
       ============================================================ */
    .toast {
      position: fixed; top: 76px; right: 18px;
      padding: 12px 16px;
      background: var(--ink);
      color: #fff;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 14px 32px -12px rgba(0,0,0,0.4);
      z-index: 60;
      transform: translateX(120%);
      transition: transform 320ms cubic-bezier(0.22, 1, 0.36, 1);
      display: flex; align-items: center; gap: 10px;
    }
    .toast[data-show="true"] {
      transform: translateX(0);
    }
    .toast__check {
      width: 22px; height: 22px;
      border-radius: 9999px;
      background: var(--brand-deep);
      display: grid; place-items: center;
      font-size: 12px;
    }

    /* ============================================================
       RSVP / Schedule sub-section
       ============================================================ */
    .rsvp {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 24px 26px;
      margin-top: 18px;
    }
    .rsvp__row {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-top: 14px;
    }
    .pill {
      padding: 10px 18px;
      border-radius: 9999px;
      border: 1px solid var(--rule);
      background: var(--paper);
      color: var(--ink-soft);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em;
    }
    .pill[data-selected="true"] {
      background: var(--ink); color: #fff;
      border-color: var(--ink);
    }
    .pill--copper[data-selected="true"] {
      background: var(--brand); color: #fff;
      border-color: var(--brand);
    }
    .pill--sage[data-selected="true"] {
      background: var(--brand-deep); color: #fff;
      border-color: var(--brand-deep);
    }

    /* ============================================================
       Email preview (pre-login)
       — Simulated inbox view: the guest opens an email from Allie
       inviting them to the portal. Clicking the CTA flips
       state.emailClicked and routes onward to the sign-in screen.
       ============================================================ */
    .email-page {
      min-height: 100vh;
      background: var(--canvas);
      padding: 32px 22px 60px;
      display: flex; flex-direction: column;
      align-items: center;
    }
    .email-page__chrome {
      width: 100%;
      max-width: 640px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4px 18px;
      color: var(--ink-muted);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .email-page__brand {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 600;
      color: var(--ink-soft);
    }
    .email-page__brand-mark {
      display: grid; place-items: center;
      width: 22px; height: 22px;
      border-radius: 5px;
      background: linear-gradient(135deg, var(--brand-darker) 0%, var(--brand-deep) 100%);
      color: #fff;
    }
    .email-page__time { font-variant-numeric: tabular-nums; }

    .mail {
      width: 100%;
      max-width: 640px;
      background: var(--paper);
      border-radius: 14px;
      border: 1px solid var(--rule);
