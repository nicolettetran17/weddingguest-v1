<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Aria & Marcus · Guest Portal — All-In Weddings</title>
  <meta name="description" content="The official guest portal for Aria & Marcus's wedding at AVA Resort Cancún. Book your room block, browse on-property spa, excursions, and dinners." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       Guest Portal — AVA Resort Cancún edition.
       Re-skinned to AVA's brand language: magenta primary, sunset
       coral secondary, sandy-cream neutrals, near-black ink, and the
       editorial Cormorant + Montserrat typography pairing that signals
       coastal modern luxury. The "Oceanfront Promise" backdrop runs
       through hero, timeline rail, and accents.
       ============================================================ */

    :root {
      /* Neutrals — warm, sandy, editorial near-black */
      --ink:            #1a1a1a;     /* AVA editorial near-black */
      --ink-soft:       #3b3633;
      --ink-muted:      #6a655f;
      --ink-faint:      #9a948b;
      --paper:          #ffffff;
      --paper-warm:     #faf6ee;     /* warm sand cream */
      --paper-cream:    #f3ead9;     /* sandy stone */
      --canvas:         #f5efe2;     /* page background — Caribbean sand */

      /* AVA brand magenta (primary accent) — replaces sage everywhere */
      --brand-pale:     #fce6f0;     /* very soft blush */
      --brand-glow:     #ff7eb6;     /* bright pink for hero shine on dark */
      --brand:          #c8307a;     /* AVA magenta (primary CTA, eyebrows) */
      --brand-deep:     #9c1f5d;     /* deeper magenta — "added/savings" */
      --brand-darker:   #5f1138;     /* deepest plum — strong contrast text */
      --brand-bg:       rgba(200,48,122,0.10);

      /* Sunset coral (secondary accent — used sparingly) */
      --coral:          #e76f51;
      --coral-soft:     #f4b1a4;

      /* Caribbean turquoise (tertiary accent — water cue) */
      --turquoise:      #3fa9b5;

      --rule:           rgba(26,26,26,0.10);
      --rule-soft:      rgba(26,26,26,0.06);
      --shadow:         0 14px 32px -22px rgba(0,0,0,0.30);
      --serif:          "Cormorant Garamond", "Playfair Display", Georgia, serif;
      --sans:           "Montserrat", "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--canvas);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button { font: inherit; cursor: pointer; }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--paper-warm);
      box-shadow: 0 0 0 1px var(--rule-soft);
    }

    /* ============================================================
       Top bar
       ============================================================ */
    .bar {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 22px;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      position: sticky; top: 0; z-index: 30;
    }
    .bar__crest {
      display: grid; place-items: center;
      width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, var(--brand-darker) 0%, var(--brand-deep) 100%);
      color: #fff;
    }
    .bar__brand {
      font-family: var(--serif);
      font-size: 14px; line-height: 1.1; color: var(--ink);
      letter-spacing: 0.2px;
    }
    .bar__divider { color: #b3aea4; font-size: 11px; }
    .bar__product {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--brand-deep); font-weight: 600;
    }
    .bar__user {
      margin-left: auto; display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--ink-soft);
    }
    .bar__avatar {
      width: 28px; height: 28px; border-radius: 9999px;
      background: linear-gradient(135deg, #d94d92, #5f1138);
      color: #fff; display: grid; place-items: center;
      font-size: 11px; font-weight: 600;
    }
    .bar__signout {
      background: none; border: 0; padding: 0;
      font-size: 11px; color: var(--brand-deep);
      letter-spacing: 0.06em;
    }

    /* ============================================================
       Section nav
       ============================================================ */
    .nav {
      display: flex; gap: 6px;
      padding: 12px 22px 0;
      background: var(--paper);
      border-bottom: 1px solid var(--rule-soft);
      overflow-x: auto;
      scrollbar-width: none;
      position: sticky; top: 57px; z-index: 20;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav__tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 14px 12px;
      border: 0;
      background: transparent;
      color: var(--ink-muted);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 200ms ease, border-color 200ms ease;
    }
    .nav__tab:hover { color: var(--ink); }
    .nav__tab[data-active="true"] {
      color: var(--ink);
      border-bottom-color: var(--brand);
    }
    .nav__tab svg { width: 14px; height: 14px; }

    /* ============================================================
       Hero countdown
       ============================================================ */
    .hero {
      position: relative;
      padding: 38px 28px 32px;
      background:
        radial-gradient(900px 420px at 80% 0%, rgba(200,48,122,0.42), transparent 55%),
        radial-gradient(700px 480px at 10% 100%, rgba(231,111,81,0.22), transparent 60%),
        linear-gradient(140deg, #131113 0%, #1f1518 55%, #2b1820 100%);
      color: #fbf3ec;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1.6px),
        radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1.6px);
      background-size: 60px 60px, 90px 90px;
      background-position: 0 0, 30px 45px;
      opacity: 0.4;
      pointer-events: none;
    }
    .hero__bg {
      position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&w=1600&q=80');
      background-size: cover; background-position: center;
      opacity: 0.22;
      filter: saturate(1.15) blur(0.5px);
      mix-blend-mode: lighten;
    }
    .hero__inner {
      position: relative;
      max-width: 760px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .hero__eyebrow {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--brand-pale);
      margin: 0;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .hero__eyebrow::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 9999px;
      background: var(--brand-pale);
      box-shadow: 0 0 0 0 rgba(255,126,182,0.55);
      animation: pulse 2.2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,126,182,0.55); }
      80%  { box-shadow: 0 0 0 12px rgba(255,126,182,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,126,182,0); }
    }
    .hero__title {
      margin: 0;
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.02;
      letter-spacing: -0.4px;
      color: #fff;
    }
    .hero__title em {
      font-style: italic;
      background: linear-gradient(120deg, var(--brand-glow) 0%, #fff0f6 50%, var(--brand-glow) 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 5.5s linear infinite;
    }
    @keyframes shine {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .hero__sub {
      margin: 0; font-size: 15px;
      color: rgba(248,243,233,0.82);
      max-width: 56ch;
    }
    .hero__count {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 540px;
    }
    .hero__cell {
      position: relative;
      padding: 14px 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,126,182,0.18);
      backdrop-filter: blur(8px);
      text-align: center;
      overflow: hidden;
    }
    .hero__cell::after {
      content: "";
      position: absolute; left: 0; right: 0; top: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,126,182,0.5), transparent);
    }
    .hero__num {
      display: block;
      font-family: var(--serif);
      font-size: clamp(28px, 4.6vw, 40px);
      line-height: 1;
      color: #fff;
      letter-spacing: -0.5px;
      font-feature-settings: "tnum" 1;
    }
    .hero__lbl {
      display: block;
      margin-top: 6px;
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,126,182,0.85);
      font-weight: 600;
    }
    .hero__meta {
      margin-top: 14px;
      display: flex; flex-wrap: wrap; gap: 18px;
      font-size: 12px; color: rgba(248,243,233,0.78);
    }
    .hero__meta strong { color: var(--brand-pale); font-weight: 600; }

    /* ============================================================
       Stat strip
       ============================================================ */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 18px 22px 4px;
      background: var(--paper);
    }
    @media (min-width: 720px) {
      .stats { grid-template-columns: repeat(4, 1fr); }
    }
    .stat-pill {
      padding: 12px 14px;
      background: var(--paper-warm);
      border: 1px solid var(--rule-soft);
      border-radius: 12px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .stat-pill__lbl {
      font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-faint); font-weight: 600;
    }
    .stat-pill__val {
      font-family: var(--serif);
      font-size: 17px; line-height: 1.2;
      color: var(--ink);
    }

    /* ============================================================
       Action tiles
       ============================================================ */
    .actions {
      padding: 20px 22px 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 720px) {
      .actions { grid-template-columns: 1fr 1fr; }
    }
    .action {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px; align-items: center;
      padding: 18px 18px 18px 16px;
      background: var(--paper);
      border: 1px solid rgba(28,28,28,0.07);
      border-radius: 14px;
      text-align: left;
      color: var(--ink);
      transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 220ms ease,
                  border-color 220ms ease;
    }
    .action:hover, .action:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(200,48,122,0.55);
      box-shadow: 0 14px 32px -22px rgba(200,48,122,0.55), 0 0 0 1px rgba(200,48,122,0.15);
      outline: none;
    }
    .action__icon {
      width: 44px; height: 44px;
      border-radius: 11px;
      background: linear-gradient(140deg, rgba(200,48,122,0.18) 0%, rgba(200,48,122,0.08) 100%);
      color: var(--brand-deep);
      display: grid; place-items: center;
    }
    .action__icon svg { width: 20px; height: 20px; }
    .action__body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .action__title {
      font-family: var(--serif);
      font-size: 19px; line-height: 1.15; color: var(--ink);
    }
    .action__body p {
      font-size: 12.5px; line-height: 1.45; color: var(--ink-muted);
      margin: 0;
    }
    .action__chev {
      color: #b3aea4;
      transition: transform 220ms ease, color 220ms ease;
    }
    .action:hover .action__chev {
      color: var(--brand);
      transform: translateX(3px);
    }
    .action__badge {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px;
      padding: 2px 8px;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 700;
      border-radius: 9999px;
      background: rgba(200,48,122,0.15);
      color: var(--brand-deep);
      align-self: flex-start;
    }
    /* Strong-accent badge variant — solid magenta chip for "premium" callouts
       (e.g. discount %, "wedding rate"). Class name kept as `--copper` only
       to avoid touching the JS templates that emit it. */
    .action__badge--copper {
      background: var(--brand);
      color: #fbfdf9;
      box-shadow: 0 1px 2px rgba(95,17,56,0.18);
    }

    /* ============================================================
       Generic section
       ============================================================ */
    .section {
      padding: 22px 26px 100px;
      min-height: 100%;
    }
    .section__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .section__back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px 6px 8px;
      border-radius: 9999px;
      background: var(--paper);
      border: 1px solid rgba(28,28,28,0.08);
      font-size: 11.5px; letter-spacing: 0.06em; font-weight: 600;
      color: var(--ink-soft);
    }
    .section__back:hover { background: var(--paper-warm); border-color: rgba(28,28,28,0.18); }
    .section__eyebrow {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--brand-deep); margin: 8px 0 2px;
    }
    .section__title {
      margin: 0;
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05; letter-spacing: -0.4px;
      color: var(--ink);
    }
    .section__title em { font-style: italic; color: var(--brand-deep); }
    .section__sub {
      margin: 6px 0 22px;
      font-size: 14px; line-height: 1.55;
      color: var(--ink-soft);
      max-width: 64ch;
    }

    /* ============================================================
       Schedule timeline (Home + Schedule section)
       ============================================================ */
    .schedule {
      display: grid; grid-template-columns: 1fr; gap: 12px;
      padding: 4px 22px 24px;
    }
    @media (min-width: 720px) {
      .schedule { grid-template-columns: repeat(3, 1fr); }
    }
    .schedule__day {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .schedule__date {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--brand-deep);
      margin: 0 0 4px;
    }
    .schedule__title {
      font-family: var(--serif);
      font-size: 20px; line-height: 1.1;
      color: var(--ink);
      margin: 0 0 12px;
      font-weight: 500;
    }
    .schedule__events { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .schedule__event {
      display: grid; grid-template-columns: 60px 1fr; gap: 12px; align-items: baseline;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--rule);
    }
    .schedule__event:last-child { border-bottom: 0; }
    .schedule__time {
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      color: var(--brand-deep);
    }
    .schedule__what { font-size: 13px; color: var(--ink); }
    .schedule__what em {
      display: block;
      font-size: 11.5px;
      color: var(--ink-muted);
      font-style: normal;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    /* ============================================================
       Wedding-weekend TIMELINE — anchor of the home + schedule pages.
       Vertical magenta rail running through three day banners; each day
       merges fixed wedding events with Allie's recommended upsells in
       chronological order so guests see the whole weekend at once.
       ============================================================ */
    .tl {
      position: relative;
      padding: 8px 22px 32px;
      max-width: 880px;
      margin: 0 auto;
    }
    /* Day banner */
    .tl-day {
      display: flex; align-items: baseline; gap: 14px;
      padding: 28px 0 14px 0;
      position: relative;
    }
    .tl-day:first-child { padding-top: 8px; }
    .tl-day__eyebrow {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--brand-deep);
      margin: 0;
      flex-shrink: 0;
    }
    .tl-day__title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.05;
      color: var(--ink);
      margin: 0;
      letter-spacing: -0.3px;
      font-style: italic;
    }
    .tl-day__rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--rule) 0%, transparent 100%);
      margin-left: 4px;
    }

    /* Each row: time | marker (with rail) | content */
    .tl-row {
      position: relative;
      display: grid;
      grid-template-columns: clamp(54px, 12vw, 78px) 28px 1fr;
      gap: 14px;
      padding: 6px 0;
      align-items: stretch;
    }
    .tl-row__time {
      padding-top: 18px;
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      color: var(--brand-deep);
      text-align: right;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    /* Marker column carries the vertical magenta rail and the dot. */
    .tl-row__rail {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
    }
    /* The vertical line is drawn by an absolute pseudo behind the dot
       so it connects through every row in the column. */
    .tl-row__rail::before {
      content: "";
      position: absolute;
      top: 0; bottom: 0; left: 50%;
      width: 1.5px;
      background: linear-gradient(180deg,
                  rgba(200,48,122,0.0) 0%,
                  rgba(200,48,122,0.45) 12%,
                  rgba(200,48,122,0.45) 88%,
                  rgba(200,48,122,0.0) 100%);
      transform: translateX(-50%);
    }
    /* First/last row in a day clip the rail so it doesn't bleed out. */
    .tl-day + .tl-row .tl-row__rail::before { top: 6px; }
    .tl-row__dot {
      position: relative;
      margin-top: 22px;
      width: 14px; height: 14px;
      border-radius: 9999px;
      background: var(--paper);
      box-shadow: inset 0 0 0 2px var(--brand);
      flex-shrink: 0;
    }
    .tl-row[data-key="ceremony"] .tl-row__dot {
      width: 18px; height: 18px;
      margin-top: 20px;
      background: var(--brand-deep);
      box-shadow: inset 0 0 0 2px var(--brand-deep),
                  0 0 0 4px rgba(200,48,122,0.18);
    }
    .tl-row--pick .tl-row__dot {
      width: 18px; height: 18px;
      margin-top: 20px;
      background: var(--brand-darker);
      box-shadow: inset 0 0 0 2px var(--brand-darker),
                  0 0 0 4px rgba(255,126,182,0.32);
    }
    /* Use a small sparkle inside the pick dot. Drawn via background SVG
       so the dot stays a clean circle visually. */
    .tl-row--pick .tl-row__dot::after {
      content: "✦";
      position: absolute;
      inset: 0;
      display: grid; place-items: center;
      color: var(--brand-pale);
      font-size: 11px;
      line-height: 1;
    }

    /* Fixed wedding event card */
    .tl-event {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 14px 18px 14px 18px;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .tl-event:hover { border-color: rgba(200,48,122,0.30); }
    .tl-event__title {
      font-family: var(--serif);
      font-size: 17px; line-height: 1.2;
      color: var(--ink);
      margin: 0 0 4px;
      font-weight: 500;
    }
    .tl-event__sub {
      font-size: 12.5px;
      color: var(--ink-muted);
      margin: 0;
      line-height: 1.5;
    }
    /* The ceremony tile gets a subtle magenta left bar + slightly heavier card */
    .tl-row[data-key="ceremony"] .tl-event {
      border-color: rgba(200,48,122,0.45);
      background: linear-gradient(135deg, var(--paper) 0%, var(--paper-warm) 100%);
      box-shadow: 0 4px 12px -8px rgba(200,48,122,0.35);
      border-left: 3px solid var(--brand-deep);
      padding-left: 16px;
    }
    .tl-row[data-key="ceremony"] .tl-event__title {
      font-size: 19px;
    }
    .tl-row[data-key="ceremony"] .tl-event__title::before {
      content: "✿";
      color: var(--brand-deep);
      margin-right: 7px;
      font-size: 14px;
      vertical-align: 1px;
    }

    /* Allie pick card — the upsell */
    .tl-pick {
      display: grid;
      grid-template-columns: 1fr;
      background:
        linear-gradient(135deg, var(--paper) 0%, var(--paper-warm) 100%);
      border: 1px solid rgba(200,48,122,0.30);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px -16px rgba(95,17,56,0.30);
      transition: transform 240ms cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 240ms ease, border-color 240ms ease;
    }
    @media (min-width: 640px) {
      .tl-pick { grid-template-columns: 168px 1fr; }
    }
    .tl-pick:hover {
      transform: translateY(-2px);
      border-color: rgba(200,48,122,0.55);
      box-shadow: 0 16px 32px -18px rgba(95,17,56,0.35);
    }
    .tl-pick__photo {
      position: relative;
      min-height: 120px;
      background-size: cover; background-position: center;
    }

    /* ============================================================
       Allie concierge callout (Schedule timeline, top)

      gap: 18px;
      align-items: center;
      padding: 20px 22px;
      margin: 0 0 22px;

        linear-gradient(135deg, #1a1a1a 0%, #2b1820 100%);

      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }
    .tl-callout::before {
      content: "";
      position: absolute;

      width: 44px; height: 44px;

    .tl-callout__eyebrow {
      font-size: 9.5px;

      font-family: var(--serif);
      font-size: 22px; line-height: 1.15;
      margin: 4px 0 0;
      color: #fff;
      font-weight: 500;
      letter-spacing: -0.2px;
    }
    .tl-callout__sub {
      margin: 6px 0 0;
      font-size: 12.5px; line-height: 1.55;
      color: rgba(251,243,236,0.78);

      display: inline-flex; align-items: center; gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .tl-callout__chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px;
      background: rgba(255,126,182,0.18);

      border-radius: 9999px;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;

      font-family: var(--serif);
      color: #fff;
      font-size: 20px;
      font-weight: 500;
    }
    .tl-callout__price em {
      font-style: normal;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(251,243,236,0.6);
      margin-left: 6px;
    }

      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 20px;
      background: var(--brand);
      color: #fff;
      border: 0;
      border-radius: 9999px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;

    /* ============================================================

      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 16px;

      position: relative;

    .card__photo::after {
      content: "";

      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.45) 100%);
    }

      position: absolute; right: 12px; top: 12px;

      font-weight: 500;

    .btn {

    .btn:hover { background: var(--ink-soft); transform: translateY(-1px); }

      background: var(--brand-deep);

    .btn--added::before {

      padding: 11px 14px;

/* ============================================================
   STATE — held in localStorage so reloads keep itinerary
   ============================================================ */

const STORE_KEY = "aiw_guest_portal_v1";

const defaultState = {
  guest: { name: "", email: "" },
  emailClicked: false,         // simulated invite-email screen on first visit
  loggedIn: false,
  section: "home",
  rsvp: null,                 // "yes" | "maybe" | "no"
  attending: null,            // "couple" | "solo" | null
  plusOne: "",
  cartOpen: false,
  /* Booked items */
  room: null,                 // { roomId, checkIn, checkOut, guests }
  spa: [],                    // [ id, ... ]
  exc: [],
  transport: null,            // { booked: true, priceUSD, kind } | null
  recovery: null,             // { booked: true, massageUSD, extendedNight: bool } | null
};

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return { ...defaultState };
    return { ...defaultState, ...JSON.parse(raw) };
  } catch (_) { return { ...defaultState }; }
}
function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (_) {}
}

/* ============================================================
   RENDER UTIL
   ============================================================ */

const $app = document.getElementById("app");

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[m]));
}

function usd(n) {
  if (typeof n !== "number") return "—";
  return "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });
}

function setApp(html) { $app.innerHTML = html; }

function showToast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toast-msg").textContent = msg;
  t.dataset.show = "true";
  clearTimeout(showToast._h);
  showToast._h = setTimeout(() => { t.dataset.show = "false"; }, 2400);
}

function initials(name) {
  if (!name) return "G";
  return name.trim().split(/\s+/).map(p => p[0] || "").join("").slice(0, 2).toUpperCase() || "G";
}

/* ============================================================
   COUNTDOWN
   ============================================================ */

let _countHandle = null;
function stopCountdown() {
  if (_countHandle) { clearInterval(_countHandle); _countHandle = null; }
}
function tickCountdown() {
  const root = document.getElementById("count-cells");
  if (!root) { stopCountdown(); return; }
  const target = new Date(WEDDING.dateISO).getTime();
  const ms = Math.max(0, target - Date.now());
  const total = Math.floor(ms / 1000);
  const days  = Math.floor(total / 86400);
  const hours = Math.floor((total % 86400) / 3600);
  const mins  = Math.floor((total %  3600) / 60);
  const secs  = total % 60;
  const map = { days, hours, mins, secs };
  Object.entries(map).forEach(([k, v]) => {
    const el = root.querySelector(`[data-cd="${k}"]`);
    if (!el) return;
    const next = String(v).padStart(k === "days" ? 3 : 2, "0");
    if (el.textContent !== next) el.textContent = next;
  });
}

   ============================================================ */

function cartLines() {
  const lines = [];
  if (state.room) {
    const r = ROOMS.find(x => x.id === state.room.roomId);
    if (r) {
      const nights = countNights(state.room.checkIn, state.room.checkOut) || 2;
      lines.push({
        kind: "Stay",
        title: `${r.name} · ${nights} ${nights === 1 ? "night" : "nights"}`,
        sub: `${state.room.checkIn} → ${state.room.checkOut} · ${state.room.guests} guest${state.room.guests > 1 ? "s" : ""}`,
        price: r.blockUSD * nights,
        remove: () => { state.room = null; saveState(); renderCart(); rerenderActive(); },
      });
    }
  }
  state.spa.forEach(id => {
    const s = SPA.find(x => x.id === id);
    if (s) lines.push({ kind: "Spa", title: s.name, sub: s.loc, price: s.priceUSD,
      remove: () => { state.spa = state.spa.filter(x => x !== id); saveState(); renderCart(); rerenderActive(); }});
  });
  state.exc.forEach(id => {
    const s = EXC.find(x => x.id === id);
    if (s) lines.push({ kind: "Excursion", title: s.name, sub: s.loc, price: s.priceUSD,
      remove: () => { state.exc = state.exc.filter(x => x !== id); saveState(); renderCart(); rerenderActive(); }});
  });
  if (state.transport?.booked) {
    lines.push({
      kind: "Transport",
      title: "Private car service · Diego",
      sub: "Round-trip CUN + on-call weekend rides",
      price: state.transport.priceUSD,
      remove: () => { state.transport = null; saveState(); renderCart(); rerenderActive(); },
    });
  }
  if (state.recovery?.booked) {
    lines.push({
      kind: "Recovery",
      title: "Post-wedding recovery massage",
      sub: "Hot Stones & Hydrotherapy · The Spa at AVA · −20%",
      price: state.recovery.massageUSD,
      remove: () => { state.recovery = null; saveState(); renderCart(); rerenderActive(); },
    });
  }
  return lines;
}

function countNights(checkInISO, checkOutISO) {
  if (!checkInISO || !checkOutISO) return 0;
  const a = new Date(checkInISO).getTime();
  const b = new Date(checkOutISO).getTime();
  if (isNaN(a) || isNaN(b) || b <= a) return 0;
  return Math.round((b - a) / 86400000);
}

function renderCart() {
  const cart = document.getElementById("cart");
  const lines = cartLines();
  cart.dataset.empty = lines.length === 0 ? "true" : "false";
  cart.dataset.open  = (state.cartOpen && lines.length > 0) ? "true" : "false";
  document.getElementById("cart-head").setAttribute("aria-expanded", String(state.cartOpen && lines.length > 0));
  const total = lines.reduce((s, l) => s + (l.price || 0), 0);
  document.getElementById("cart-total").textContent = usd(total);
  document.getElementById("cart-sub").textContent =
    lines.length === 0
      ? "Tap to expand · 0 items added"
      : `Tap to ${state.cartOpen ? "collapse" : "expand"} · ${lines.length} item${lines.length === 1 ? "" : "s"} · group code applied`;

  const list = document.getElementById("cart-list");
  list.innerHTML = lines.map((l, idx) => `
    <li class="cart__line">
      <span>
        <strong>${escapeHtml(l.title)}</strong>
        <em>${escapeHtml(l.kind)} · ${escapeHtml(l.sub)}</em>
      </span>
      <span class="cart__line-price">${usd(l.price)}</span>
      <button type="button" class="cart__remove" data-cart-remove="${idx}" aria-label="Remove ${escapeHtml(l.title)}">×</button>
    </li>
  `).join("");

  list.querySelectorAll("[data-cart-remove]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const idx = +btn.getAttribute("data-cart-remove");
      const ln = lines[idx];
      if (ln && typeof ln.remove === "function") ln.remove();
    });
  });
}

document.getElementById("cart-head").addEventListener("click", () => {
  state.cartOpen = !state.cartOpen;
  saveState();
  renderCart();
});

document.getElementById("cart-checkout").addEventListener("click", () => {
  const lines = cartLines();
  if (!lines.length) return;
  const total = lines.reduce((s, l) => s + (l.price || 0), 0);
  showToast(`Confirmed · ${lines.length} item${lines.length === 1 ? "" : "s"} · ${usd(total)} on hold`);
  state.cartOpen = false;
  saveState();
  renderCart();
});

    case "stay":       return renderStay();
    case "spa":        return renderSpa();
    case "excursions": return renderExc();
    case "schedule":   return renderSchedule();
    case "home":

}

/* ============================================================
   TIMELINE — anchor of the home + schedule pages
   Merges fixed wedding events (SCHEDULE) with Allie's recommended
   upsells (ALLIE_PICKS) day-by-day in chronological order.
   ============================================================ */

function parseTimeToMin(t) {
  const m = /^(\d{1,2}):(\d{2})\s*(AM|PM)$/i.exec(String(t || "").trim());
  if (!m) return 0;
  let h = +m[1];
  const min = +m[2];
  const ampm = m[3].toUpperCase();
  if (ampm === "PM" && h !== 12) h += 12;
  if (ampm === "AM" && h === 12) h = 0;
  return h * 60 + min;
}

function renderTimeline(opts = {}) {
  const calloutHtml = opts.showTransport ? renderTransportCallout() : "";
  const html = SCHEDULE.map(day => {
    const fixedRows = day.events.map(e => ({
      type:    "fixed",
      time:    e.time,
      sortMin: parseTimeToMin(e.time),
      what:    e.what,
      em:      e.em,
      key:     e.key || null,
    }));
    const pickRows = ALLIE_PICKS.filter(p => p.day === day.day).map(p => {
      const inv  = p.cartKey === "spa" ? SPA : EXC;
      const item = inv.find(x => x.id === p.id);
      return {
        type:    "pick",
        time:    p.time,
        sortMin: p.sortMin || parseTimeToMin(p.time),
        pick:    p,
        item,
      };
    });
    const rows = [...fixedRows, ...pickRows].sort((a, b) => a.sortMin - b.sortMin);
    const rowsHtml = rows.map(r => r.type === "pick" ? renderPickRow(r) : renderFixedRow(r)).join("");

    return `
      <div class="tl-day">
        <p class="tl-day__eyebrow">${escapeHtml(day.date)}</p>
        <h3 class="tl-day__title">${escapeHtml(day.title)}</h3>
        <span class="tl-day__rule" aria-hidden="true"></span>
      </div>
      ${rowsHtml}
    `;
  }).join("");

function attachTimeline() {
  document.querySelectorAll("[data-toggle-pick]").forEach(btn => {
    btn.addEventListener("click", () => {
      const [id, key] = btn.getAttribute("data-toggle-pick").split(":");
      const inv  = key === "spa" ? SPA : EXC;
      const item = inv.find(x => x.id === id);
      if (state[key].includes(id)) {
        state[key] = state[key].filter(x => x !== id);
        showToast(`Removed · ${item?.name || "item"}`);
      } else {
        state[key] = [...state[key], id];
        state.cartOpen = true;
        showToast(`Added · ${item?.name || "item"}`);
      }
      saveState();
      route();
    });
  });
  document.querySelectorAll("[data-book-transport]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.transport?.booked) {
        state.transport = null;
        showToast("Transport removed · Diego freed up");
      } else {
        state.transport = { booked: true, priceUSD: 245, kind: "round" };
        state.cartOpen = true;
        showToast("Transport booked · Diego is your driver");
      }
      saveState();
      route();
    });
  });
}

            ${isBooked ? "Held" : "Hold this room"}
          </button>
        </div>
      </article>
    `;
  }).join("");

  setApp(`

    ${renderNav("stay")}

        <button type="button" class="section__back" data-section="home">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>

        </button>
      </div>
      <p class="section__eyebrow">Stay · Room block</p>
      <h1 class="section__title">Where you'll <em>sleep</em>.</h1>
      <p class="section__sub">
        Aria and Marcus held a room block at AVA Resort Cancún through <strong>Feb 13, 2026</strong>. Block rates are <strong>up to 27% off</strong> AVA's published all-inclusive nightly rate, with the resort fee waived. Two-night minimum.
      </p>

      <div class="stay-banner">
        <span class="stay-banner__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </span>
        <div>
          <h3 class="stay-banner__title">Group code applied automatically</h3>
          <p class="stay-banner__sub">No promo to enter — your link is keyed to the wedding block.</p>
        </div>
        <span class="stay-banner__code">${escapeHtml(WEDDING.groupCode)}</span>
      </div>

      <div class="stay-form">
        <div class="field">
          <label for="check-in">Check-in</label>
          <input id="check-in" type="date" value="${checkIn}" min="2026-03-12" max="2026-03-17"/>
        </div>
        <div class="field">
          <label for="check-out">Check-out</label>
          <input id="check-out" type="date" value="${checkOut}" min="2026-03-13" max="2026-03-22"/>

      renderCart();
    });
  });
  renderCart();

        showToast(`Removed · ${item?.name || "item"}`);
      } else {
        state[key] = [...list, id];
        state.cartOpen = true;
        showToast(`Added · ${item?.name || "item"}`);
      }
      saveState();
      route();
    });
  });
  renderCart();
}

function renderSpa() {
  return renderAddons({
    section: "spa",
    eyebrow: "Spa · The Spa at AVA",
    title: `Make the days <em>feel</em> long.`,
    sub: `The Spa at AVA is the resort's signature wellness wing — thermal hydrotherapy circuit, oceanfront treatment suites, the same therapists Aria booked for the wedding party. Every booking carries a 15% wedding rate.`,
    items: SPA,
    stateKey: "spa",
  });
}

function renderExc() {
  return renderAddons({
    section: "excursions",
    eyebrow: "Excursions · Off property",
    title: `What you'll <em>do</em> when you're not eating.`,
    sub: `Hotel-arranged transfers, group-block pricing. Most are bookable up to 24 hours before — but the boat trips fill first.`,
    items: EXC,
    stateKey: "exc",
  });
}

/* ============================================================
   SCHEDULE (full)
   ============================================================ */

function renderSchedule() {
  const extend = extendStayState();

  setApp(`
    ${renderBar()}
    ${renderNav("schedule")}
    <main class="section">
      <div class="section__head">
        <button type="button" class="section__back" data-section="home">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </button>
      </div>
      <p class="section__eyebrow">Schedule · Mar 13–15, 2026</p>
      <h1 class="section__title">The whole <em>weekend</em>, on one page.</h1>
      <p class="section__sub">All times in Eastern Standard (EST · UTC-5 · Cancún time, no DST). The plain rows below are Aria's locked events; the card rows are Allie's recommended add-ons with All-In wedding-block pricing — tap to add or remove anytime.</p>
    </main>

    <section class="extend-banner" aria-label="Extend your stay promotion">
      <div class="extend-banner__body">
        <span class="extend-banner__chip">−10% off block rate</span>
        <h3 class="extend-banner__title">Extend your stay for <em>10% off</em></h3>
        <p class="extend-banner__sub">${extend.sub}</p>
      </div>
      <button type="button" class="extend-banner__cta" data-extend-night ${extend.disabled ? "disabled" : ""}>
        ${extend.ctaLabel}
      </button>
    </section>

    ${renderTimeline({ showTransport: true })}

    ${renderRecoveryBundle()}

    <main class="section" style="padding-top:0;">
      <section class="rsvp" style="margin-top:8px;">
        <p class="section__eyebrow">Logistics</p>
        <h2 class="section__title" style="font-size:26px;">Need-to-know.</h2>
        <ul style="margin:14px 0 0; padding:0; list-style:none; display:flex; flex-direction:column; gap:10px; font-size:13px; color:var(--ink-soft); line-height:1.55;">
          <li><strong style="color:var(--ink);">Airport:</strong> Cancún International (CUN), 25 minutes from the resort. Hotel shuttle included with the room block — book through the Stay tab.</li>
          <li><strong style="color:var(--ink);">Currency:</strong> US dollars accepted everywhere on property. Tip in either USD or pesos — both happily.</li>
          <li><strong style="color:var(--ink);">Weather:</strong> low-80s, light Caribbean breeze. Pack a light layer for the 7 PM AVA Salon Ballroom reception.</li>
          <li><strong style="color:var(--ink);">Hashtag:</strong> ${escapeHtml(WEDDING.hashtag)} — Aria is collecting everyone's photos here for the wedding album.</li>
          <li><strong style="color:var(--ink);">Questions:</strong> reply to the email this portal came from and your concierge (Allie) will jump in within 24 hrs.</li>
        </ul>
      </section>
    </main>
  `);
  attachChrome();
  attachTimeline();
  attachExtendStay();
  attachRecoveryBundle();
  renderCart();
}

/* ============================================================
   Extend-stay promo helpers
   — On Schedule, guests can extend their room block by one night
   at a 10% discount on the block rate. Hooked to the room booking
   if present; otherwise routes to Stay to pick a room first.
   ============================================================ */
const EXTEND_MAX_CHECKOUT = "2026-03-22"; // matches the Stay form max

function extendStayState() {
  if (!state.room) {
    return {
      ctaLabel: "Add an additional night →",
      sub: "Stay an extra night at AVA — recover by the pool, snorkel one more day, fly home rested. Wedding-block guests get an extra 10% off the block rate on nights before or after the wedding weekend. Pick your room first, then tap to extend.",
      disabled: false,
    };
  }
  const co = state.room.checkOut;
  const atMax = co >= EXTEND_MAX_CHECKOUT;
  const r = ROOMS.find(x => x.id === state.room.roomId);
  const nights = countNights(state.room.checkIn, co) || 2;
  const extraNightUSD = r ? Math.round(r.blockUSD * 0.9) : null;
  if (atMax) {
    return {
      ctaLabel: "Maxed out — call concierge",
      sub: `You're booked through ${co}, the longest extension on the block. Reply to Allie to add nights past Sun Mar 22 — she'll quote the published rate directly.`,
      disabled: true,
    };
  }
  return {
    ctaLabel: "Add an additional night →",
    sub: `You're currently booked for ${nights} ${nights === 1 ? "night" : "nights"} (${state.room.checkIn} → ${co}). Add a Sunday-night recovery day at the wedding block rate${extraNightUSD ? ` — about ${usd(extraNightUSD)} for the extra night after the 10% discount` : ""}. Most ${WEDDING.couple.split(" ")[0]} & ${WEDDING.partner.split(" ")[0]} guests are staying through Monday brunch.`,
    disabled: false,
  };
}

function addOneNight(iso) {
  const d = new Date(iso + "T12:00:00Z");
  d.setUTCDate(d.getUTCDate() + 1);
  return d.toISOString().slice(0, 10);
}

function attachExtendStay() {
  document.querySelectorAll("[data-extend-night]").forEach(btn => {
    if (btn.hasAttribute("disabled")) return;
    btn.addEventListener("click", () => {
      if (!state.room) {
        state.section = "stay";
        saveState();
        route();
        showToast("Pick your room — we'll apply the extra night with the 10% extension after.");
        return;
      }
      const next = addOneNight(state.room.checkOut);
      if (next > EXTEND_MAX_CHECKOUT) {
        showToast("Already at the max extension — reply to Allie for longer stays");
        return;
      }
      state.room = { ...state.room, checkOut: next };
      saveState();
      renderSchedule();
      showToast(`Extra night added — checking out ${next}`);
    });
  });
}

/* ============================================================
   Recovery-bundle helpers
   — Post-wedding bundle: +1 hotel night and a 20%-off massage.
   The massage is the discounted Hot Stones & Hydrotherapy ritual
   from The Spa at AVA. Booking this also extends state.room.checkOut
   by one day (if there's headroom on the block).
   ============================================================ */
const RECOVERY_BASE_MASSAGE_USD = 240;   // Hot Stones & Hydrotherapy rack rate
const RECOVERY_MASSAGE_USD      = Math.round(RECOVERY_BASE_MASSAGE_USD * 0.8); // 192

function renderRecoveryBundle() {
  const booked = !!state.recovery?.booked;
  const title  = booked
    ? "Recovery bundle is in"
    : "Need some time to <em>recover</em> post-wedding?";
  const sub    = booked
    ? "Extra night added at AVA, plus a 20% off Hot Stones & Hydrotherapy massage at The Spa. Allie will text Sunday morning to confirm the massage time."
    : "Add an extra night at AVA and a 20% off massage. The wedding's over, the dance floor took its toll, and you've got nowhere to be — slow Monday morning, oceanfront balcony, then ease in with hot stones at The Spa.";
  const cta    = booked ? "Booked — manage" : "Add my recovery bundle →";
  return `
    <section class="recovery-banner ${booked ? "recovery-banner--booked" : ""}" aria-label="Post-wedding recovery bundle">
      <div class="recovery-banner__body">
        <span class="recovery-banner__chip">−20% massage · +1 night</span>
        <h3 class="recovery-banner__title">${title}</h3>
        <p class="recovery-banner__sub">${sub}</p>
        <ul class="recovery-banner__bullets">
          <li>Extra night at the block rate</li>
          <li>Hot Stones &amp; Hydrotherapy · 60 min</li>
          <li>Late checkout · 2 PM</li>
        </ul>
      </div>
      <button type="button" class="recovery-banner__cta" data-book-recovery>
        ${cta}
      </button>
    </section>
  `;
}

function attachRecoveryBundle() {
  document.querySelectorAll("[data-book-recovery]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.recovery?.booked) {
        state.recovery = null;
        saveState();
        renderSchedule();
        showToast("Recovery bundle removed");
        return;
      }
      let extendedNight = false;
      if (state.room) {
        const next = addOneNight(state.room.checkOut);
        if (next <= EXTEND_MAX_CHECKOUT) {
          state.room = { ...state.room, checkOut: next };
          extendedNight = true;
        }
      }
      state.recovery = {
        booked: true,
        massageUSD: RECOVERY_MASSAGE_USD,
        extendedNight,
      };
      state.cartOpen = true;
      saveState();
      renderSchedule();
      if (!state.room) {
        showToast("Massage added at −20% · pick a room to lock the extra night");
      } else if (extendedNight) {
        showToast(`Recovery bundle added · extra night + massage at ${usd(RECOVERY_MASSAGE_USD)}`);
      } else {
        showToast("Massage added at −20% · stay already at the max extension");
      }
    });
  });
}

/* ============================================================
   BOOT
   ============================================================ */

route();
</script>
