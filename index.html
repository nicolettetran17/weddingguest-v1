   ============================================================ */

const STORE_KEY = "aiw_guest_portal_v1";

const defaultState = {
  guest: { name: "", email: "" },
  emailClicked: false,         // simulated invite-email screen on first visit
  loggedIn: false,
  section: "stay",             // Stay is the primary landing tab — book first, browse second
  rsvp: null,                 // "yes" | "maybe" | "no"
  attending: null,            // "couple" | "solo" | null
  plusOne: "",
  cartOpen: false,
  /* Booked items */
  room: null,                 // { roomId, checkIn, checkOut, guests }
  spa: [],                    // [ id, ... ]
  exc: [],
  transport: null,            // { booked: true, priceUSD, kind } | null
  recovery: null,             // { booked: true, massageUSD, extendedNight: bool } | null
  registryGifts: [],          // [{ id, amount, type: "full"|"fund" }]
  /* Referral program — seed with one pending + one booked friend
     so the "voucher earned" state is visible out of the box. Each
     entry: { name, email, status: "invited"|"booked", invitedAt,
              bookedAt? } */
  referrals: [
    { name: "Camila Reyes", email: "camila.r@gmail.com",
      status: "invited", invitedAt: "2026-04-03" },
    { name: "Marcus Pham",  email: "mp@hey.com",
      status: "booked",  invitedAt: "2026-03-30", bookedAt: "2026-04-08" },
  ],
};

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return { ...defaultState };
    return { ...defaultState, ...JSON.parse(raw) };
  } catch (_) { return { ...defaultState }; }
}
function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (_) {}
}

/* ============================================================
   RENDER UTIL
   ============================================================ */

const $app = document.getElementById("app");

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[m]));
}

function usd(n) {
  if (typeof n !== "number") return "—";
  const sign = n < 0 ? "−" : "";
  const abs  = Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
  return `${sign}$${abs}`;
}

/* ============================================================
   REFERRAL PROGRAM
   — Deterministic code derived from the guest's email so the
   same person always sees the same code across sessions. The
   first friend who books unlocks a free round-trip airport
   voucher worth $245; the voucher applies against state.transport
   if the guest has booked transportation, otherwise it shows in
   the cart as a bankable perk ready to apply at check-in.
   ============================================================ */
const VOUCHER_USD = 245;
function makeReferralCode(email) {
  const s = String(email || "guest").toLowerCase().trim();
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) | 0;
  const tail = Math.abs(h).toString(36).toUpperCase().padStart(5, "0").slice(0, 5);
  return `ARIAMRC-${tail}`;
}
function referralLink(email) {
  return `https://allinweddings.com/aria-marcus?ref=${makeReferralCode(email)}`;
}
function earnedVoucherCount() {
  return (state.referrals || []).filter(r => r.status === "booked").length;
}
function pendingReferralCount() {
  return (state.referrals || []).filter(r => r.status === "invited").length;
}

function setApp(html) { $app.innerHTML = html; }

function showToast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toast-msg").textContent = msg;
  t.dataset.show = "true";
  clearTimeout(showToast._h);
  showToast._h = setTimeout(() => { t.dataset.show = "false"; }, 2400);
}

function initials(name) {
  if (!name) return "G";
  return name.trim().split(/\s+/).map(p => p[0] || "").join("").slice(0, 2).toUpperCase() || "G";
}

/* ============================================================
   COUNTDOWN
   ============================================================ */

let _countHandle = null;
function stopCountdown() {
  if (_countHandle) { clearInterval(_countHandle); _countHandle = null; }
}
function tickCountdown() {
  const root = document.getElementById("count-cells");
  if (!root) { stopCountdown(); return; }
  const target = new Date(WEDDING.dateISO).getTime();
  const ms = Math.max(0, target - Date.now());
  const total = Math.floor(ms / 1000);
  const days  = Math.floor(total / 86400);
  const hours = Math.floor((total % 86400) / 3600);
  const mins  = Math.floor((total %  3600) / 60);
  const secs  = total % 60;
  const map = { days, hours, mins, secs };
  Object.entries(map).forEach(([k, v]) => {
    const el = root.querySelector(`[data-cd="${k}"]`);
    if (!el) return;
    const next = String(v).padStart(k === "days" ? 3 : 2, "0");
    if (el.textContent !== next) el.textContent = next;
  });
}

/* ============================================================
   ITINERARY / CART
   ============================================================ */

function cartLines() {
  const lines = [];
  if (state.room) {
    const r = ROOMS.find(x => x.id === state.room.roomId);
    if (r) {
      const nights = countNights(state.room.checkIn, state.room.checkOut) || 2;
      const savings = (r.listUSD - r.blockUSD) * nights;
      const discountPct = Math.round((r.listUSD - r.blockUSD) / r.listUSD * 100);
      lines.push({
        kind: "Stay",
        title: `${r.name} · ${nights} ${nights === 1 ? "night" : "nights"}`,
        sub: `${state.room.checkIn} → ${state.room.checkOut} · ${state.room.guests} guest${state.room.guests > 1 ? "s" : ""} · ${discountPct}% block discount · save ${usd(savings)}`,
        price: r.blockUSD * nights,
        remove: () => { state.room = null; saveState(); renderCart(); rerenderActive(); },
      });
    }
  }
  state.spa.forEach(id => {
    const s = SPA.find(x => x.id === id);
    if (s) lines.push({ kind: "Spa", title: s.name, sub: s.loc, price: s.priceUSD,
      remove: () => { state.spa = state.spa.filter(x => x !== id); saveState(); renderCart(); rerenderActive(); }});
  });
  state.exc.forEach(id => {
    const s = EXC.find(x => x.id === id);
    if (s) lines.push({ kind: "Excursion", title: s.name, sub: s.loc, price: s.priceUSD,
      remove: () => { state.exc = state.exc.filter(x => x !== id); saveState(); renderCart(); rerenderActive(); }});
  });
  if (state.transport?.booked) {
    lines.push({
      kind: "Transport",
      title: "Private car service · Diego",
      sub: "Round-trip CUN + on-call weekend rides",
      price: state.transport.priceUSD,
      remove: () => { state.transport = null; saveState(); renderCart(); rerenderActive(); },
    });
  }
  if (state.recovery?.booked) {
    lines.push({
      kind: "Recovery",
      title: "Post-wedding recovery massage",
      sub: "Hot Stones & Hydrotherapy · The Spa at AVA · −20%",
      price: state.recovery.massageUSD,
      remove: () => { state.recovery = null; saveState(); renderCart(); rerenderActive(); },
    });
  }
  (state.registryGifts || []).forEach(g => {
    const item = REGISTRY.find(x => x.id === g.id);
    if (!item) return;
    lines.push({
      kind: "Wedding gift",
      title: item.type === "fund"
        ? `Honeymoon fund · gift for Aria & Marcus`
        : `${item.name} · gift for Aria & Marcus`,
      sub: item.type === "fund"
        ? "Pooled honeymoon contribution · charged at check-in"
        : `${item.eyebrow} · charged at check-in`,
      price: g.amount || 0,
      remove: () => {
        state.registryGifts = state.registryGifts.filter(x => x.id !== g.id);
        saveState();
        renderCart();
        rerenderActive();
      },
    });
  });
  /* Earned referral vouchers — applies against the transport
     line if booked, otherwise shows as a bankable $0 perk so the
     guest still sees the reward sitting in their cart. */
  const earnedVouchers = earnedVoucherCount();
  if (earnedVouchers > 0) {
    const txpBooked = !!state.transport?.booked;
    const txpPrice  = state.transport?.priceUSD || VOUCHER_USD;
    if (txpBooked) {
      lines.push({
        kind: "Referral perk",
        title: "Transportation voucher · applied",
        sub: `Earned by referring ${earnedVouchers > 1 ? `${earnedVouchers} friends` : "a friend"} who booked · −${usd(txpPrice)}`,
        price: -txpPrice,
        perk: true,
      });
      if (earnedVouchers > 1) {
        lines.push({
          kind: "Referral perk",
          title: `${earnedVouchers - 1} additional voucher${earnedVouchers > 2 ? "s" : ""} · banked`,
          sub: "Use at check-in for spa, dining, or extra airport runs",
          price: 0,
          perk: true,
        });
      }
    } else {
      lines.push({
        kind: "Referral perk",
        title: `${earnedVouchers} transportation voucher${earnedVouchers > 1 ? "s" : ""} · ready to apply`,
        sub: "Free round-trip airport service · auto-applies when you book transportation",
        price: 0,
        perk: true,
      });
    }
  }
  return lines;
}

function countNights(checkInISO, checkOutISO) {
  if (!checkInISO || !checkOutISO) return 0;
  const a = new Date(checkInISO).getTime();
  const b = new Date(checkOutISO).getTime();
  if (isNaN(a) || isNaN(b) || b <= a) return 0;
  return Math.round((b - a) / 86400000);
}

function renderCart() {
  const cart = document.getElementById("cart");
  const lines = cartLines();
  cart.dataset.empty = lines.length === 0 ? "true" : "false";
  cart.dataset.open  = (state.cartOpen && lines.length > 0) ? "true" : "false";
  document.getElementById("cart-head").setAttribute("aria-expanded", String(state.cartOpen && lines.length > 0));
  const total = lines.reduce((s, l) => s + (l.price || 0), 0);
  document.getElementById("cart-total").textContent = usd(total);
  document.getElementById("cart-sub").textContent =
    lines.length === 0
      ? "Tap to expand · 0 items added"
      : `Tap to ${state.cartOpen ? "collapse" : "expand"} · ${lines.length} item${lines.length === 1 ? "" : "s"} · group code applied`;

  const list = document.getElementById("cart-list");
  list.innerHTML = lines.map((l, idx) => `
    <li class="cart__line${l.perk ? " cart__line--perk" : ""}">
      <span>
        <strong>${escapeHtml(l.title)}</strong>
        <em>${escapeHtml(l.kind)} · ${escapeHtml(l.sub)}</em>
      </span>
      <span class="cart__line-price">${l.price === 0 && l.perk ? "Free" : usd(l.price)}</span>
      ${typeof l.remove === "function"
        ? `<button type="button" class="cart__remove" data-cart-remove="${idx}" aria-label="Remove ${escapeHtml(l.title)}">×</button>`
        : `<span class="cart__remove" aria-hidden="true" style="visibility:hidden;">×</span>`}
    </li>
  `).join("");

  list.querySelectorAll("[data-cart-remove]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const idx = +btn.getAttribute("data-cart-remove");
      const ln = lines[idx];
      if (ln && typeof ln.remove === "function") ln.remove();
    });
  });
}

document.getElementById("cart-head").addEventListener("click", () => {
  state.cartOpen = !state.cartOpen;
  saveState();
  renderCart();
});

document.getElementById("cart-checkout").addEventListener("click", () => {
  const lines = cartLines();
  if (!lines.length) return;
  const total = lines.reduce((s, l) => s + (l.price || 0), 0);
  showToast(`Confirmed · ${lines.length} item${lines.length === 1 ? "" : "s"} · ${usd(total)} on hold`);
  state.cartOpen = false;
  saveState();
  renderCart();
});

function route() {
  stopCountdown();
  /* Migration: if the user was already logged in from a prior session,
     skip the new email-preview gate. */
  if (state.loggedIn && !state.emailClicked) {
    state.emailClicked = true;
    saveState();
  }
  if (!state.emailClicked) return renderEmail();
  if (!state.loggedIn) return renderLogin();
  switch (state.section) {
    case "home":       return renderHome();
    case "spa":        return renderSpa();
    case "excursions": return renderExc();
    case "schedule":   return renderSchedule();
    case "registry":   return renderRegistry();
    case "profile":    return renderProfile();
    case "stay":
    default:           return renderStay();
  }
}

function rerenderActive() { route(); }

/* ============================================================
   TIMELINE — anchor of the home + schedule pages
   Merges fixed wedding events (SCHEDULE) with Allie's recommended
   upsells (ALLIE_PICKS) day-by-day in chronological order.
   ============================================================ */

function parseTimeToMin(t) {
  const m = /^(\d{1,2}):(\d{2})\s*(AM|PM)$/i.exec(String(t || "").trim());
  if (!m) return 0;
  let h = +m[1];
  const min = +m[2];
  const ampm = m[3].toUpperCase();
  if (ampm === "PM" && h !== 12) h += 12;
  if (ampm === "AM" && h === 12) h = 0;
  return h * 60 + min;
}

function renderTimeline(opts = {}) {
  const calloutHtml = opts.showTransport ? renderTransportCallout() : "";
  const html = SCHEDULE.map(day => {
    const fixedRows = day.events.map(e => ({
      type:    "fixed",
      time:    e.time,
      sortMin: parseTimeToMin(e.time),
      what:    e.what,
      em:      e.em,
      key:     e.key || null,
    }));
    const pickRows = ALLIE_PICKS.filter(p => p.day === day.day).map(p => {
      const inv  = p.cartKey === "spa" ? SPA : EXC;
      const item = inv.find(x => x.id === p.id);
      return {
        type:    "pick",
        time:    p.time,
        sortMin: p.sortMin || parseTimeToMin(p.time),
        pick:    p,
        item,
      };
    });
    const rows = [...fixedRows, ...pickRows].sort((a, b) => a.sortMin - b.sortMin);
    const rowsHtml = rows.map(r => r.type === "pick" ? renderPickRow(r) : renderFixedRow(r)).join("");

    return `
      <div class="tl-day">
        <p class="tl-day__eyebrow">${escapeHtml(day.date)}</p>
        <h3 class="tl-day__title">${escapeHtml(day.title)}</h3>
        <span class="tl-day__rule" aria-hidden="true"></span>
      </div>
      ${rowsHtml}
    `;
  }).join("");
  return `<div class="tl">${calloutHtml}${html}</div>`;
}

function attachTimeline() {
  document.querySelectorAll("[data-toggle-pick]").forEach(btn => {

      const [id, key] = btn.getAttribute("data-toggle-pick").split(":");
      const inv  = key === "spa" ? SPA : EXC;
      const item = inv.find(x => x.id === id);
      if (state[key].includes(id)) {
        state[key] = state[key].filter(x => x !== id);
        showToast(`Removed · ${item?.name || "item"}`);
      } else {
        state[key] = [...state[key], id];
        state.cartOpen = true;
        showToast(`Added · ${item?.name || "item"}`);
      }
      saveState();
      route();
    });
  });
  document.querySelectorAll("[data-book-transport]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.transport?.booked) {
        state.transport = null;
        showToast("Transport removed · Diego freed up");

        state.transport = { booked: true, priceUSD: 245, kind: "round" };
        state.cartOpen = true;

      route();
    });
  });
}

        <div class="arrive-tip__body">

          <button type="button" class="stay-plan__cta" data-plan-four ${stayingFullArc ? "tabindex=\"-1\" aria-disabled=\"true\"" : ""}>

        <div class="field">
          <label for="check-out">Check-out</label>
          <input id="check-out" type="date" value="${checkOut}" min="2026-03-13" max="2026-03-22"/>
        </div>
        <div class="field">
          <label for="guests">Guests</label>
          <select id="guests">
            ${[1,2,3,4,5].map(n => `<option value="${n}" ${n === +guests ? "selected" : ""}>${n} ${n === 1 ? "guest" : "guests"}</option>`).join("")}

  attachChrome();

  /* Book buttons */
  document.querySelectorAll("[data-book-room]").forEach(btn => {
    btn.addEventListener("click", () => {
      const roomId = btn.getAttribute("data-book-room");
      const ci = document.getElementById("check-in").value;
      const co = document.getElementById("check-out").value;
      const g  = +document.getElementById("guests").value || 2;
      if (countNights(ci, co) < 2) {
        showToast("Two-night minimum — extend your check-out");
        return;
      }
      state.room = { roomId, checkIn: ci, checkOut: co, guests: g };
      state.cartOpen = true;
      saveState();
      const r = ROOMS.find(x => x.id === roomId);
      showToast(`${r.name} held · ${countNights(ci, co)} nights`);
      renderStay();
      renderCart();
    });
  });

  /* Re-render footer prices live as dates / occupancy change */
  ["check-in", "check-out", "guests"].forEach(id => {
    document.getElementById(id).addEventListener("change", () => {
      const ci = document.getElementById("check-in").value;
      const co = document.getElementById("check-out").value;
      const g  = +document.getElementById("guests").value || 2;
      if (state.room) {
        state.room = { ...state.room, checkIn: ci, checkOut: co, guests: g };
        saveState();
      }
      renderStay();
      renderCart();
    });
  });

  /* Arrive-early callout — one-click: pulls the check-in to Mar 12
     and, if the guest hasn't yet, nudges the check-out out by one
     extra night so they still keep the same length of stay. If a
     room is already held, update state.room in place. */
  document.querySelectorAll("[data-arrive-early]").forEach(btn => {
    if (btn.getAttribute("aria-disabled") === "true") return;
    btn.addEventListener("click", () => {
      const ciInput = document.getElementById("check-in");
      const coInput = document.getElementById("check-out");
      const prevCi = ciInput.value;
      const prevCo = coInput.value;
      const prevNights = countNights(prevCi, prevCo) || 2;
      ciInput.value = EARLY_ARRIVAL_ISO;
      /* Preserve the same length of stay if the original check-out
         was at or after the wedding date; otherwise leave check-out
         alone so the form's `max` constraints still hold. */
      const minNewCo = new Date(EARLY_ARRIVAL_ISO + "T12:00:00");
      minNewCo.setDate(minNewCo.getDate() + prevNights);
      const newCoISO = minNewCo.toISOString().slice(0, 10);
      if (newCoISO <= "2026-03-22" && newCoISO > coInput.value) {
        coInput.value = newCoISO;
      }
      if (state.room) {
        state.room = {
          ...state.room,
          checkIn: ciInput.value,
          checkOut: coInput.value,
        };
        saveState();
      }
      showToast("Check-in moved to Mar 12 · you'll arrive with the wedding party");
      renderStay();
      renderCart();
    });
  });

  /* Stay-plan CTA — one-click "build the full 4-night arc". Sets
     Thu Mar 12 → Mon Mar 16 and persists if a room is already
     held. The excursion thumbnails inside the panel are plain
     [data-section="excursions"] buttons, picked up by attachChrome
     above, so they need no extra wiring here. */
  document.querySelectorAll("[data-plan-four]").forEach(btn => {
    if (btn.getAttribute("aria-disabled") === "true") return;
    btn.addEventListener("click", () => {
      const ciInput = document.getElementById("check-in");
      const coInput = document.getElementById("check-out");
      ciInput.value = EARLY_ARRIVAL_ISO;
      coInput.value = FULL_ARC_CHECKOUT_ISO;
      if (state.room) {
        state.room = {
          ...state.room,
          checkIn: EARLY_ARRIVAL_ISO,
          checkOut: FULL_ARC_CHECKOUT_ISO,
        };
        saveState();
      }
      showToast(`Booked for ${FULL_ARC_NIGHTS} nights · Thu → Mon, same as the wedding party`);
      renderStay();
      renderCart();
    });
  });

  renderCart();
}

function renderAddons({ section, eyebrow, title, sub, items, stateKey }) {
  const cardsHtml = items.map(it => {

    return `
      <article class="card">
        <div class="card__photo" style="background-image:url('${it.photo}')">
          ${it.allieRec ? `<span class="card__pricetag" style="left:12px;right:auto;top:12px;background:var(--brand-darker);color:var(--brand-glow);letter-spacing:0.16em;">★ Allie's pick</span>` : ""}
          ${it.popular  && !it.allieRec ? `<span class="card__pricetag" style="background:var(--brand);color:#fff;">Most booked</span>` : ""}
          ${it.soldOut  ? `<span class="card__pricetag" style="background:rgba(43,43,39,0.92);color:#fff;">Invite only</span>` : ""}
        </div>
        <div class="card__body">
          <span class="card__eyebrow">${escapeHtml(it.loc)}</span>
          <h3 class="card__title">${escapeHtml(it.name)}</h3>
          <p class="card__desc">${escapeHtml(it.desc)}</p>
          <ul class="card__bullets">
            ${it.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join("")}
          </ul>
        </div>
        <div class="card__foot">
          <div class="card__price">
            ${it.publishedUSD && savings > 0 ? `<span><s>${usd(it.publishedUSD)}</s></span>` : ""}
            <strong>${it.priceUSD ? usd(it.priceUSD) : "—"}</strong>
            <span>${
              it.priceUSD
                ? (savings > 0 ? `All-In rate · save ${usd(savings)}` : "wedding rate · per booking")
                : "by invitation"
            }</span>
          </div>
          ${it.soldOut
            ? `<button class="btn btn--ghost" disabled style="opacity:0.6;cursor:not-allowed;">Invite only</button>`
            : inItin
              ? `<button class="btn btn--added" data-toggle-addon="${stateKey}:${it.id}">Added</button>`
              : `<button class="btn" data-toggle-addon="${stateKey}:${it.id}">Add to itinerary</button>`}
        </div>
      </article>
    `;
  }).join("");

  setApp(`
    ${renderBar()}
    ${renderNav(section)}
    <main class="section">
      <div class="section__head">
        <button type="button" class="section__back" data-section="home">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </button>
      </div>
      <p class="section__eyebrow">${escapeHtml(eyebrow)}</p>
      <h1 class="section__title">${title}</h1>
      <p class="section__sub">${sub}</p>
      <div class="card-grid card-grid--3">${cardsHtml}</div>
    </main>
  `);
  attachChrome();
  document.querySelectorAll("[data-toggle-addon]").forEach(btn => {
    btn.addEventListener("click", () => {
      const [key, id] = btn.getAttribute("data-toggle-addon").split(":");
      const list = state[key];
      const item = items.find(x => x.id === id);
      if (list.includes(id)) {
        state[key] = list.filter(x => x !== id);
        showToast(`Removed · ${item?.name || "item"}`);
      } else {
        state[key] = [...list, id];
        state.cartOpen = true;
        showToast(`Added · ${item?.name || "item"}`);
      }
      saveState();
      route();
    });
  });
  renderCart();
}

/* ============================================================
   REGISTRY — guest-side gift registry
   — "Wedding extras" the couple has put on a registry. Two
   shapes (see REGISTRY data block at top of script):
     - "full" cards: one guest pays the listed price in full
       and the experience is marked "Gifted by you" / "Already
       gifted" so it can't be double-claimed.
     - "fund" card: pooled honeymoon contribution. The guest
       can type any amount; quick-pick chips populate the input.
   Each gift the guest makes is stored in state.registryGifts
   and shows up as a "Wedding gift" line in the cart drawer.
   ============================================================ */

function renderRegistry() {
  /* Fund stats — the displayed `raised` includes the seed
     `raisedUSD` from data plus the current guest's contribution
     (if any). This gives the guest immediate visual feedback
     when they add to the fund. */
  const fundItem = REGISTRY.find(r => r.type === "fund");
  const yourContribution = state.registryGifts.find(g => g.id === fundItem?.id)?.amount || 0;
  const fundRaised = (fundItem?.raisedUSD || 0) + yourContribution;
  const fundGoal   = fundItem?.goalUSD || 0;
  const fundPct    = fundGoal ? Math.min(100, Math.round(fundRaised / fundGoal * 100)) : 0;

  /* Experience-claim stats — "X of Y experiences claimed".
     Counts experiences either pre-claimed (claimedBy seeded in
     data) or gifted by the current guest in this session. */
  const fullItems  = REGISTRY.filter(r => r.type === "full");
  const claimedByOthers = fullItems.filter(r => r.claimedBy).length;
  const claimedByYou    = state.registryGifts.filter(g => {
    const it = REGISTRY.find(r => r.id === g.id);
    return it && it.type === "full";
  }).length;
  const claimedTotal = claimedByOthers + claimedByYou;
  const totalFull    = fullItems.length;

  const cardsHtml = REGISTRY.map(item => {
    if (item.type === "fund") {
      return renderRegistryFundCard(item, yourContribution, fundRaised, fundGoal, fundPct);
    }
    return renderRegistryFullCard(item);
  }).join("");

  setApp(`
    ${renderBar()}
    ${renderNav("registry")}
    <main class="section">
      <div class="section__head">
        <button type="button" class="section__back" data-section="home">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </button>
      </div>
      <p class="section__eyebrow">Registry · Wedding extras</p>
      <h1 class="section__title">Give the couple something they'll <em>actually</em> remember.</h1>
      <p class="section__sub">Aria &amp; Marcus skipped the toaster registry — instead they've put together a handful of on-property experiences and one shared honeymoon fund. Pick an experience to gift in full, or contribute any amount to the fund. Gifts ride along with the rest of your weekend itinerary below, and nothing is charged until you arrive at AVA.</p>
    </main>

    <section class="registry-banner" aria-label="Registry progress">
      <div class="registry-banner__body">
        <span class="registry-banner__chip">Wedding extras · gift the couple</span>
        <h3 class="registry-banner__title">${claimedTotal} of ${totalFull} experiences claimed · <em>${usd(fundRaised)}</em> in the honeymoon fund</h3>
        <p class="registry-banner__sub">Allie handles all the logistics behind the scenes — Aria &amp; Marcus only see the gifters' names on the card waiting in their suite. Each experience can be claimed by one guest; the honeymoon fund pools contributions from everyone.</p>
        <div class="registry-banner__progress" aria-hidden="true">
          <span style="width:${fundPct}%"></span>
        </div>
        <p class="registry-banner__meta"><strong>${usd(fundRaised)}</strong> raised of ${usd(fundGoal)} goal · ${fundPct}% to target${yourContribution > 0 ? ` · including <strong>${usd(yourContribution)}</strong> from you` : ""}</p>
      </div>
    </section>

    <main class="section" style="padding-top:6px;">
      <div class="card-grid card-grid--3">${cardsHtml}</div>
    </main>
  `);
  attachChrome();
  attachRegistry();
  renderCart();
}

function renderRegistryFullCard(item) {
  const youGifted = state.registryGifts.some(g => g.id === item.id);
  const otherClaim = item.claimedBy && !youGifted ? item.claimedBy : null;
  const isClaimed = youGifted || !!otherClaim;
  const cardClass = `card${isClaimed ? " card--gifted" : ""}${youGifted ? " card--yours" : ""}`;
  return `
    <article class="${cardClass}" data-registry-card="${item.id}">
      <div class="card__photo" style="background-image:url('${item.photo}')">
        <span class="card__pricetag card__pricetag--solid" style="background:var(--brand);color:#fff;letter-spacing:0.12em;">${usd(item.priceUSD)} · Gift</span>
        ${otherClaim ? `<span class="card__pricetag card__pricetag--solid" style="left:12px;right:auto;top:12px;background:rgba(43,43,39,0.92);color:#fff;letter-spacing:0.12em;">Gifted by ${escapeHtml(otherClaim)}</span>` : ""}
        ${youGifted ? `<span class="card__pricetag card__pricetag--solid" style="left:12px;right:auto;top:12px;background:var(--brand-darker);color:var(--brand-glow);letter-spacing:0.12em;">★ You gifted this</span>` : ""}
      </div>
      <div class="card__body">
        <span class="card__eyebrow">${escapeHtml(item.eyebrow)}</span>
        <h3 class="card__title">${escapeHtml(item.name)}</h3>
        <p class="card__desc">${escapeHtml(item.desc)}</p>
        <ul class="card__bullets">
          ${item.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join("")}
        </ul>
      </div>
      <div class="card__foot">
        <div class="card__price">
          <strong>${usd(item.priceUSD)}</strong>
          <span>${otherClaim ? "Already claimed" : youGifted ? "Your gift · charged at check-in" : "Gift in full · for the couple"}</span>
        </div>
        ${otherClaim
          ? `<button class="btn btn--ghost" disabled style="opacity:0.55;cursor:not-allowed;">Already gifted</button>`
          : youGifted
            ? `<button class="btn btn--added" data-gift-toggle="${item.id}">Gifted</button>`
            : `<button class="btn" data-gift-toggle="${item.id}">Gift this experience</button>`}
      </div>
    </article>
  `;
}

function renderRegistryFundCard(item, yourContribution, raised, goal, pct) {
  const quick = [50, 100, 250, 500];
  const giftedAny = yourContribution > 0;
  const cardClass = `card${giftedAny ? " card--yours" : ""}`;
  const inputDefault = yourContribution || 100;
  return `
    <article class="${cardClass}" data-registry-card="${item.id}">
      <div class="card__photo" style="background-image:url('${item.photo}')">
        <span class="card__pricetag card__pricetag--solid" style="background:var(--coral);color:#fff;letter-spacing:0.12em;">Honeymoon fund</span>
        ${giftedAny ? `<span class="card__pricetag card__pricetag--solid" style="left:12px;right:auto;top:12px;background:var(--brand-darker);color:var(--brand-glow);letter-spacing:0.12em;">★ You added ${usd(yourContribution)}</span>` : ""}
      </div>
      <div class="card__body">
        <span class="card__eyebrow">${escapeHtml(item.eyebrow)}</span>
        <h3 class="card__title">${escapeHtml(item.name)}</h3>
        <p class="card__desc">${escapeHtml(item.desc)}</p>

        <div class="fund-meta">
          <span><strong>${usd(raised)}</strong> raised</span>
          <span>${usd(goal)} goal · ${pct}%</span>
        </div>
        <div class="fund-bar" aria-hidden="true"><span style="width:${pct}%"></span></div>

        <div class="contribute-row">
          <label class="amount-label" for="reg-fund-input">Contribute</label>
          <span class="amount-input">
            <input type="number" min="0" step="10" id="reg-fund-input"
                   value="${inputDefault}"
                   aria-label="Contribution amount in dollars" />
          </span>
          <div class="quick" role="group" aria-label="Quick amounts">
            ${quick.map(a => `<button type="button" data-fund-quick="${a}">$${a}</button>`).join("")}
          </div>
        </div>
      </div>
      <div class="card__foot">
        <div class="card__price">
          ${giftedAny
            ? `<strong>${usd(yourContribution)}</strong><span>Your contribution · combined with others</span>`
            : `<strong>Any amount</strong><span>100% goes to Aria &amp; Marcus</span>`}
        </div>
        ${giftedAny
          ? `<button class="btn btn--added" data-fund-update>Contribution added</button>`
          : `<button class="btn" data-fund-add>Add to itinerary</button>`}
      </div>
    </article>
  `;
}

function attachRegistry() {
  /* Full experience: gift in full / remove gift */
  document.querySelectorAll("[data-gift-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-gift-toggle");
      const item = REGISTRY.find(r => r.id === id);
      if (!item) return;
      const has = state.registryGifts.some(g => g.id === id);
      if (has) {
        state.registryGifts = state.registryGifts.filter(g => g.id !== id);
        showToast(`Gift removed · ${item.name}`);
      } else {
        state.registryGifts = [
          ...state.registryGifts,
          { id, amount: item.priceUSD, type: "full" },
        ];
        state.cartOpen = true;
        showToast(`Gifted ${item.name} for Aria & Marcus`);
      }
      saveState();
      route();
    });
  });

  /* Fund card — quick-pick chips just populate the input;
     they don't commit until the guest hits Add / Update. */
  const fundItem = REGISTRY.find(r => r.type === "fund");
  if (!fundItem) return;
  const input = document.getElementById("reg-fund-input");

  document.querySelectorAll("[data-fund-quick]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (input) {
        input.value = btn.getAttribute("data-fund-quick");
        input.focus();
      }
    });
  });

  function commitFund(amount, isUpdate) {
    if (!Number.isFinite(amount) || amount <= 0) {
      showToast("Pick an amount to contribute");
      return;
    }
    state.registryGifts = [
      ...state.registryGifts.filter(g => g.id !== fundItem.id),
      { id: fundItem.id, amount, type: "fund" },
    ];
    state.cartOpen = true;
    saveState();
    showToast(isUpdate
      ? `Honeymoon fund updated · ${usd(amount)}`
      : `${usd(amount)} added to Aria & Marcus's honeymoon fund`);
    route();
  }

  document.querySelectorAll("[data-fund-add]").forEach(btn => {
    btn.addEventListener("click", () => {
      const amount = Math.max(0, Math.round(Number(input?.value) || 0));
      commitFund(amount, false);
    });
  });

  /* When the contribution is already added, the same button
     becomes an "update" affordance — committing whatever's in
     the input now. We also commit on blur of the input so the
     amount stays in sync if the guest just edits the number. */
  document.querySelectorAll("[data-fund-update]").forEach(btn => {
    btn.addEventListener("click", () => {
      const amount = Math.max(0, Math.round(Number(input?.value) || 0));
      if (amount === 0) {
        state.registryGifts = state.registryGifts.filter(g => g.id !== fundItem.id);
        saveState();
        showToast("Honeymoon contribution removed");
        route();
        return;
      }
      commitFund(amount, true);
    });
  });

  if (input) {
    input.addEventListener("change", () => {
      if (!state.registryGifts.some(g => g.id === fundItem.id)) return;
      const amount = Math.max(0, Math.round(Number(input.value) || 0));
      if (amount > 0) commitFund(amount, true);
    });
  }
}

function formatShortDate(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso + "T12:00:00");
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  } catch (_) { return iso; }
}

function attachProfile() {
  /* Copy-to-clipboard for the code + link rows. Falls back to a
     toast even if Clipboard API isn't available (e.g. insecure
     contexts) so the demo never feels broken. */
  document.querySelectorAll("[data-copy-target]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const targetId = btn.getAttribute("data-copy-target");
      const label    = btn.getAttribute("data-copy-label") || "Copied";
      const text = document.getElementById(targetId)?.textContent || "";
      const original = btn.textContent;
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        btn.dataset.copied = "true";
        btn.textContent = "Copied ✓";
        showToast(`${label} copied to clipboard`);
        setTimeout(() => {
          btn.dataset.copied = "false";
          btn.textContent = original;
        }, 1600);
      } catch (_) {
        showToast(`${label}: ${text}`);
      }
    });
  });

  /* Native share — when available (mobile Safari, Chrome Android)
     this surfaces the OS share sheet. Otherwise falls back to
     copying the link. */
  document.querySelectorAll("[data-share-native]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const email = state.guest.email || DEFAULT_GUEST.email;
      const link  = referralLink(email);
      const code  = makeReferralCode(email);
      const shareData = {
        title: "Aria & Marcus's wedding",
        text:  `Come to Aria & Marcus's wedding at AVA Cancún with me — book through this link and I get a free transportation voucher!`,
        url:   link,
      };
      try {
        if (navigator.share) {
          await navigator.share(shareData);
          showToast("Shared · thanks for spreading the word");
        } else {
          await navigator.clipboard.writeText(`${shareData.text} ${link} (code ${code})`);
          showToast("Share message copied — paste it anywhere");
        }
      } catch (_) { /* user cancelled */ }
    });
  });

  /* Invite form — adds a pending friend to state.referrals and
     simulates "we sent the email" with a toast. */
  const form = document.getElementById("invite-form");
  if (form) {
    form.addEventListener("submit", e => {
      e.preventDefault();
      const fd = new FormData(form);
      const friendName  = String(fd.get("friendName") || "").trim();
      const friendEmail = String(fd.get("friendEmail") || "").trim();
      if (!friendName || !friendEmail) return;
      /* Block obvious duplicates by email match */
      const dup = (state.referrals || []).some(r => r.email.toLowerCase() === friendEmail.toLowerCase());
      if (dup) {
        showToast(`${friendName.split(" ")[0]} is already on your invite list`);
        return;
      }
      const today = new Date().toISOString().slice(0, 10);
      state.referrals = [
        ...(state.referrals || []),
        { name: friendName, email: friendEmail, status: "invited", invitedAt: today },
      ];
      saveState();
      showToast(`Invite sent to ${friendName.split(" ")[0]} — we'll ping you when they book`);
      route();
    });
  }

  /* Resend stub — refreshes the invitedAt timestamp so the row
     visibly updates, and toasts the user. */
  document.querySelectorAll("[data-resend]").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = +btn.getAttribute("data-resend");
      const r = state.referrals[idx];
      if (!r) return;
      const today = new Date().toISOString().slice(0, 10);
      state.referrals = state.referrals.map((row, i) =>
        i === idx ? { ...row, invitedAt: today } : row);
      saveState();
      showToast(`Reminder sent to ${r.name.split(" ")[0]}`);
      route();
    });
  });

  /* Sign out from the profile hero — mirrors the bar action. */
  document.getElementById("profile-signout")?.addEventListener("click", () => {
    state.loggedIn = false;
    saveState();
    route();
  });
}

/* ============================================================
   Extend-stay promo helpers
   — On Schedule, guests can extend their room block by one night
   at a 10% discount on the block rate. Hooked to the room booking
   if present; otherwise routes to Stay to pick a room first.
   ============================================================ */
const EXTEND_MAX_CHECKOUT = "2026-03-22"; // matches the Stay form max

function extendStayState() {
  if (!state.room) {
    return {
      ctaLabel: "Add an additional night →",
      sub: "Stay an extra night at AVA — recover by the pool, snorkel one more day, fly home rested. Wedding-block guests get an extra 10% off the block rate on nights before or after the wedding weekend. Pick your room first, then tap to extend.",
      disabled: false,
    };
  }
  const co = state.room.checkOut;
  const atMax = co >= EXTEND_MAX_CHECKOUT;
  const r = ROOMS.find(x => x.id === state.room.roomId);
  const nights = countNights(state.room.checkIn, co) || 2;
  const extraNightUSD = r ? Math.round(r.blockUSD * 0.9) : null;
  if (atMax) {
    return {
      ctaLabel: "Maxed out — call concierge",
      sub: `You're booked through ${co}, the longest extension on the block. Reply to Allie to add nights past Sun Mar 22 — she'll quote the published rate directly.`,
      disabled: true,
    };
  }
  return {
    ctaLabel: "Add an additional night →",
    sub: `You're currently booked for ${nights} ${nights === 1 ? "night" : "nights"} (${state.room.checkIn} → ${co}). Add a Sunday-night recovery day at the wedding block rate${extraNightUSD ? ` — about ${usd(extraNightUSD)} for the extra night after the 10% discount` : ""}. Most ${WEDDING.couple.split(" ")[0]} & ${WEDDING.partner.split(" ")[0]} guests are staying through Monday brunch.`,
    disabled: false,
  };
}

function addOneNight(iso) {
  const d = new Date(iso + "T12:00:00Z");
  d.setUTCDate(d.getUTCDate() + 1);
  return d.toISOString().slice(0, 10);
}

function attachExtendStay() {
  document.querySelectorAll("[data-extend-night]").forEach(btn => {
    if (btn.hasAttribute("disabled")) return;
    btn.addEventListener("click", () => {
      if (!state.room) {
        state.section = "stay";
        saveState();
        route();
        showToast("Pick your room — we'll apply the extra night with the 10% extension after.");
        return;
      }
      const next = addOneNight(state.room.checkOut);
      if (next > EXTEND_MAX_CHECKOUT) {
        showToast("Already at the max extension — reply to Allie for longer stays");
        return;
      }
      state.room = { ...state.room, checkOut: next };
      saveState();
      renderSchedule();
      showToast(`Extra night added — checking out ${next}`);
    });
  });
}

          <li>Extra night at the block rate</li>
          <li>Hot Stones &amp; Hydrotherapy · 60 min</li>
          <li>Late checkout · 2 PM</li>
        </ul>
      </div>
      <button type="button" class="recovery-banner__cta" data-book-recovery>
        ${cta}
      </button>
    </section>
  `;
}

function attachRecoveryBundle() {
  document.querySelectorAll("[data-book-recovery]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.recovery?.booked) {
        state.recovery = null;
        saveState();
        renderSchedule();
        showToast("Recovery bundle removed");
        return;
      }
      let extendedNight = false;
      if (state.room) {
        const next = addOneNight(state.room.checkOut);
        if (next <= EXTEND_MAX_CHECKOUT) {
          state.room = { ...state.room, checkOut: next };
          extendedNight = true;
        }
      }
      state.recovery = {
        booked: true,
        massageUSD: RECOVERY_MASSAGE_USD,
        extendedNight,
      };
      state.cartOpen = true;
      saveState();
      renderSchedule();
      if (!state.room) {
        showToast("Massage added at −20% · pick a room to lock the extra night");
      } else if (extendedNight) {
        showToast(`Recovery bundle added · extra night + massage at ${usd(RECOVERY_MASSAGE_USD)}`);
      } else {
        showToast("Massage added at −20% · stay already at the max extension");
      }
    });
  });
}

/* ============================================================
   BOOT
   ============================================================ */

route();
</script>
